<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evastek Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, updateDoc, deleteDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUuFK_7atCyD2p9x2igCAqsVgwqzXGxfE",
  authDomain: "evastek-6e62c.firebaseapp.com",
  projectId: "evastek-6e62c",
  storageBucket: "evastek-6e62c.firebasestorage.app",
  messagingSenderId: "852647780160",
  appId: "1:852647780160:web:64a93580cf11878fc2e4a5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

window._FB = { auth, db, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword,
  doc, setDoc, getDocs, updateDoc, deleteDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where };

async function syncUsers() {
  const snap = await getDocs(collection(db,'users'));
  DB.users = [];
  snap.forEach(d => DB.users.push({ ...d.data(), id: d.id }));
}
async function syncAudit() {
  DB.auditLog = [];
  try {
    const snap = await getDocs(query(collection(db,'auditLog'), orderBy('ts','desc')));
    snap.forEach(d => DB.auditLog.push({ ...d.data(), id: d.id }));
  } catch(e){}
}
async function syncMessages() {
  DB.messages = {1:[],2:[],3:[],4:[]};
  try {
    const snap = await getDocs(query(collection(db,'messages'), orderBy('ts','asc')));
    snap.forEach(d => { const m=d.data(); const l=m.level; if(!DB.messages[l]) DB.messages[l]=[]; DB.messages[l].push({...m,docId:d.id}); });
  } catch(e){}
}
async function saveUser(user) {
  const { id, ...data } = user;
  await setDoc(doc(db,'users',String(id)), data);
}
async function patchUser(uid, fields) {
  await updateDoc(doc(db,'users',String(uid)), fields);
}
async function removeUser(uid) {
  await deleteDoc(doc(db,'users',String(uid)));
}
async function addMessage(msg) {
  await addDoc(collection(db,'messages'), { ...msg, ts: serverTimestamp() });
}
async function addAudit(entry) {
  await addDoc(collection(db,'auditLog'), { ...entry, ts: serverTimestamp() });
}

let _chatUnsub = null;
function subscribeChat(level, containerId) {
  if (_chatUnsub) { _chatUnsub(); _chatUnsub = null; }
  const q = query(collection(db,'messages'), where('level','==',level), orderBy('ts','asc'));
  _chatUnsub = onSnapshot(q, snap => {
    DB.messages[level] = [];
    snap.forEach(d => DB.messages[level].push({ ...d.data(), docId: d.id }));
    const el = document.getElementById(containerId);
    if (!el) return;
    const u = currentUser;
    el.innerHTML = DB.messages[level].map(m => `
      <div class="chat-msg ${m.uid===u.id?'mine':''}">
        <div class="chat-msg-avatar" style="background:${m.color};color:#fff;">${m.avatar}</div>
        <div>
          ${m.uid!==u.id?`<div style="font-size:0.72rem;color:var(--muted);margin-bottom:3px;">${m.name}</div>`:''}
          <div class="chat-bubble">${m.text}</div>
          <div class="chat-meta">${m.time}</div>
        </div>
      </div>`).join('') || '<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:40px 0;">Nenhuma mensagem ainda neste nível.</div>';
    el.scrollTop = el.scrollHeight;
  });
}

function showLoading(msg) {
  let el = document.getElementById('fb-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'fb-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(28,31,38,0.94);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    el.innerHTML = `<div style="width:36px;height:36px;border:3px solid rgba(74,158,221,0.3);border-top-color:#4a9edd;border-radius:50%;animation:fbspin 0.8s linear infinite;"></div><div id="fb-loading-msg" style="font-size:0.88rem;color:#8a9ab0;"></div>`;
    const s = document.createElement('style'); s.textContent='@keyframes fbspin{to{transform:rotate(360deg)}}'; document.head.appendChild(s);
    document.body.appendChild(el);
  } else { el.style.display='flex'; }
  const m = document.getElementById('fb-loading-msg'); if(m) m.textContent = msg||'Carregando...';
}
function hideLoading() { const el=document.getElementById('fb-loading'); if(el) el.style.display='none'; }

window._fbHelpers = { syncUsers, syncAudit, syncMessages, saveUser, patchUser, removeUser, addMessage, addAudit, subscribeChat, showLoading, hideLoading, get _chatUnsub(){ return _chatUnsub; }, set _chatUnsub(v){ _chatUnsub=v; } };

// ── Seed only admin account if Firestore is empty ──
const ADMIN_SEED = [
  { email:'admin@evastek.com', pass:'admin123', data:{ name:'Admin Evastek', email:'admin@evastek.com', pass:'admin123', role:'admin', company:'Evastek', level:0, progress:100, points:0, avatar:'AE', color:'#1a5fa8', suspended:null } }
];
(async () => {
  try {
    const snap = await getDocs(collection(db,'users'));
    if (!snap.empty) return;
    for (const u of ADMIN_SEED) {
      try {
        const cred = await createUserWithEmailAndPassword(auth, u.email, u.pass);
        await setDoc(doc(db,'users',cred.user.uid), { ...u.data, id: cred.user.uid });
      } catch(e) { console.warn('Seed admin skip:', e.message); }
    }
    await signOut(auth);
  } catch(e) { console.warn('Seed failed:', e.message); }
})();
</script>

<style>
:root {
  --dark:#1c1f26; --dark2:#22262f; --dark3:#282d38;
  --light:#f8f9fa; --muted:#8a9ab0; --border:rgba(248,249,250,0.07);
  --accent:#1a5fa8; --accent-light:#4a9edd;
  --l1:#4a9edd; --l1-bg:rgba(74,158,221,0.1);
  --l2:#2ecc8f; --l2-bg:rgba(46,204,143,0.1);
  --l3:#f0a500; --l3-bg:rgba(240,165,0,0.1);
  --l4:#a78bfa; --l4-bg:rgba(167,139,250,0.1);
  --green:#2ecc8f; --red:#ff5c5c; --yellow:#f0a500;
  --sidebar:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--light);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh;}

.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(13,43,78,0.7) 0%,transparent 70%);}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);}
.login-box{position:relative;z-index:1;width:100%;max-width:420px;padding:0 24px;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-0.02em;text-align:center;margin-bottom:8px;}
.login-logo span{color:var(--accent-light);}
.login-sub{text-align:center;font-size:0.82rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:48px;}
.login-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:36px;}
.login-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:8px;}
.field input,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;}
.field input:focus,.field textarea:focus{border-color:var(--accent-light);}
.btn-login{width:100%;background:var(--light);color:var(--dark);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:14px;border:none;border-radius:4px;cursor:pointer;margin-top:8px;transition:background 0.3s,transform 0.2s;}
.btn-login:hover{background:#c8d6e8;transform:translateY(-1px);}
.login-hint{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:20px;}
.login-err{font-size:0.8rem;color:var(--red);text-align:center;margin-top:12px;display:none;}

/* APP SHELL */
#screen-app{flex-direction:row;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo a{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;color:var(--light);text-decoration:none;}
.sidebar-logo a span{color:var(--accent-light);}
.sidebar-logo .platform-tag{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;flex-shrink:0;}
.user-info .user-name{font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.user-info .user-role{font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.sidebar-nav{flex:1;padding:16px 0;}
.nav-section-title{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:8px 20px 4px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);font-size:0.85rem;font-weight:400;cursor:pointer;transition:color 0.2s,background 0.2s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--light);background:rgba(255,255,255,0.03);}
.nav-item.active{color:var(--light);background:rgba(74,158,221,0.07);border-left-color:var(--accent-light);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.nav-badge{background:var(--accent);color:#fff;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.btn-logout{width:100%;background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:10px;cursor:pointer;transition:color 0.3s,border-color 0.3s;}
.btn-logout:hover{color:var(--red);border-color:var(--red);}

/* MAIN */
.main-content{flex:1;overflow-y:auto;height:100vh;}
.page{display:none;padding:32px 36px;animation:fadeIn 0.3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.page-header{margin-bottom:32px;}
.page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-0.02em;margin-bottom:4px;}
.page-subtitle{font-size:0.88rem;color:var(--muted);}

/* CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:20px 24px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.c1::before{background:var(--l1);}.stat-card.c2::before{background:var(--l2);}
.stat-card.c3::before{background:var(--l3);}.stat-card.c4::before{background:var(--l4);}
.stat-card-label{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:8px;}
.stat-card-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.stat-card-sub{font-size:0.75rem;color:var(--muted);margin-top:4px;}

/* BADGE */
.level-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;border:1px solid;}
.badge-l1{background:var(--l1-bg);border-color:var(--l1);color:var(--l1);}
.badge-l2{background:var(--l2-bg);border-color:var(--l2);color:var(--l2);}
.badge-l3{background:var(--l3-bg);border-color:var(--l3);color:var(--l3);}
.badge-l4{background:var(--l4-bg);border-color:var(--l4);color:var(--l4);}

/* PROGRESS */
.progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.8s ease;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* BOX */
.box{background:var(--dark2);border:1px solid var(--border);border-radius:6px;}
.box-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.box-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:-0.01em;}
.box-body{padding:20px 24px;}

/* TASK */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.task-check.done{background:var(--green);border-color:var(--green);}
.task-check svg{width:10px;height:10px;}
.task-label{font-size:0.85rem;line-height:1.5;}
.task-label.done-text{text-decoration:line-through;color:var(--muted);}
.task-tag{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* RANKING */
.rank-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;width:28px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#fbbf24;}.rank-pos.silver{color:#9ca3af;}.rank-pos.bronze{color:#cd7c35;}
.rank-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-size:0.88rem;font-weight:500;}
.rank-company{font-size:0.75rem;color:var(--muted);}
.rank-score{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.rank-item.me{background:rgba(74,158,221,0.06);margin:0 -24px;padding:12px 24px;border-radius:4px;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:500px;}
.chat-messages{flex:1;overflow-y:auto;padding:0 0 16px;display:flex;flex-direction:column;gap:12px;}
.chat-msg{display:flex;gap:10px;align-items:flex-end;}
.chat-msg.mine{flex-direction:row-reverse;}
.chat-msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.65rem;flex-shrink:0;}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:12px;font-size:0.85rem;line-height:1.5;}
.chat-msg:not(.mine) .chat-bubble{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-bottom-left-radius:4px;}
.chat-msg.mine .chat-bubble{background:var(--accent);border-bottom-right-radius:4px;}
.chat-meta{font-size:0.68rem;color:var(--muted);margin-top:3px;text-align:right;}
.chat-msg:not(.mine) .chat-meta{text-align:left;}
.chat-input-wrap{display:flex;gap:10px;padding-top:16px;border-top:1px solid var(--border);}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:10px 14px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.3s;}
.chat-input:focus{border-color:var(--accent-light);}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:10px 18px;cursor:pointer;font-size:0.82rem;font-weight:500;transition:background 0.2s;}
.chat-send:hover{background:var(--accent-light);}

/* LEVEL HERO */
.level-hero{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:32px;position:relative;overflow:hidden;margin-bottom:20px;}
.level-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.lh-l1::before{background:var(--l1);}.lh-l2::before{background:var(--l2);}
.lh-l3::before{background:var(--l3);}.lh-l4::before{background:var(--l4);}
.level-hero-bg-num{position:absolute;right:24px;bottom:-16px;font-family:'Syne',sans-serif;font-size:8rem;font-weight:800;opacity:0.05;letter-spacing:-0.05em;line-height:1;}
.lh-row{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.lh-orb{width:64px;height:64px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;flex-shrink:0;}
.lh-l1 .lh-orb{border-color:var(--l1);color:var(--l1);background:var(--l1-bg);}
.lh-l2 .lh-orb{border-color:var(--l2);color:var(--l2);background:var(--l2-bg);}
.lh-l3 .lh-orb{border-color:var(--l3);color:var(--l3);background:var(--l3-bg);}
.lh-l4 .lh-orb{border-color:var(--l4);color:var(--l4);background:var(--l4-bg);}
.lh-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;}
.lh-sub{font-size:0.85rem;color:var(--muted);margin-top:4px;}
.progress-section{margin-top:4px;}
.progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.8rem;}
.progress-info span{color:var(--muted);}
.progress-pct{font-family:'Syne',sans-serif;font-weight:700;}

/* SERVICES */
.tag-ok{background:rgba(46,204,143,0.12);color:var(--green);}
.tag-lock{background:rgba(255,255,255,0.05);color:var(--muted);}
.service-mini-tag{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:10px;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
thead th{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);}
tbody tr{transition:background 0.2s;}
tbody tr:hover{background:rgba(255,255,255,0.02);}
tbody td{padding:12px 14px;font-size:0.85rem;border-bottom:1px solid var(--border);}
tbody tr:last-child td{border-bottom:none;}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:9px 18px;border-radius:4px;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--light);color:var(--dark);}.btn-primary:hover{background:#c8d6e8;}
.btn-accent{background:var(--accent);color:#fff;}.btn-accent:hover{background:var(--accent-light);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}.btn-ghost:hover{border-color:rgba(255,255,255,0.3);color:var(--light);}
.btn-danger{background:none;border:1px solid rgba(255,92,92,0.3);color:var(--red);}.btn-danger:hover{background:rgba(255,92,92,0.1);}
.btn-sm{padding:6px 12px;font-size:0.7rem;}
.btn-green{background:none;border:1px solid rgba(46,204,143,0.3);color:var(--green);}.btn-green:hover{background:rgba(46,204,143,0.1);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:32px;width:100%;max-width:560px;animation:fadeIn 0.25s ease;max-height:90vh;overflow-y:auto;}
.modal-wide{max-width:700px;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.select-field{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;appearance:none;}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:14px 20px;font-size:0.85rem;z-index:9999;display:none;animation:slideIn 0.3s ease;}
.notif.show{display:block;}
.notif.success{border-left:3px solid var(--green);}
.notif.error{border-left:3px solid var(--red);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border);}
.timeline-item{position:relative;margin-bottom:20px;}
.timeline-dot{position:absolute;left:-24px;top:3px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--dark2);display:flex;align-items:center;justify-content:center;}
.timeline-dot.done{border-color:var(--green);background:rgba(46,204,143,0.1);}
.timeline-dot.active-dot{border-color:var(--accent-light);background:rgba(74,158,221,0.1);box-shadow:0 0 0 3px rgba(74,158,221,0.15);}
.timeline-title{font-size:0.85rem;font-weight:500;margin-bottom:2px;}
.timeline-sub{font-size:0.75rem;color:var(--muted);}

/* AUDIT */
.audit-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.audit-item:last-child{border-bottom:none;}
.audit-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;margin-top:1px;}
.audit-icon.type-edit{background:rgba(74,158,221,0.15);border:1px solid rgba(74,158,221,0.3);}
.audit-icon.type-create{background:rgba(46,204,143,0.15);border:1px solid rgba(46,204,143,0.3);}
.audit-icon.type-delete{background:rgba(255,92,92,0.15);border:1px solid rgba(255,92,92,0.3);}
.audit-icon.type-level{background:rgba(240,165,0,0.15);border:1px solid rgba(240,165,0,0.3);}
.audit-icon.type-suspend{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);}
.audit-icon.type-unsuspend{background:rgba(46,204,143,0.15);border:1px solid rgba(46,204,143,0.3);}
.audit-icon.type-task{background:rgba(74,158,221,0.1);border:1px solid rgba(74,158,221,0.2);}
.audit-content{flex:1;}
.audit-action{font-size:0.85rem;font-weight:500;line-height:1.4;margin-bottom:3px;}
.audit-meta{font-size:0.72rem;color:var(--muted);}
.audit-admin{color:var(--accent-light);font-weight:600;}
.audit-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.audit-filter-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:all 0.2s;}
.audit-filter-btn.active{border-color:var(--accent-light);color:var(--accent-light);background:rgba(74,158,221,0.08);}

/* SUSPENSION */
.suspended-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:10px;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:rgba(255,92,92,0.12);color:var(--red);border:1px solid rgba(255,92,92,0.3);}
.suspend-modal-opts{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
.suspend-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.2s;}
.suspend-opt:hover,.suspend-opt.selected{border-color:var(--red);background:rgba(255,92,92,0.06);}
.suspend-opt input[type=radio]{accent-color:var(--red);width:16px;height:16px;}
.suspend-opt label{font-size:0.85rem;cursor:pointer;flex:1;}

/* TASK EDITOR */
.task-edit-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.task-edit-row:last-child{border-bottom:none;}
.task-edit-row input[type=text]{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.83rem;outline:none;}
.task-edit-row input[type=text]:focus{border-color:var(--accent-light);}
.task-edit-row input[type=number]{width:70px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:7px 8px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.83rem;outline:none;text-align:center;}
.task-edit-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.task-done-toggle{width:20px;height:20px;border-radius:50%;border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  .grid-3{grid-template-columns:1fr;}
  .page{padding:20px 16px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">evas<span>tek</span></div>
    <div class="login-sub">Plataforma de Clientes</div>
    <div class="login-card">
      <div class="login-title">Entrar na plataforma</div>
      <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <button class="btn-login" onclick="doLogin()">Acessar plataforma</button>
      <div class="login-err" id="login-err">E-mail ou senha incorretos.</div>
    </div>
    <div class="login-hint">🔥 Conectado ao Firebase</div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="#">evas<span>tek</span></a>
      <div class="platform-tag">Client Platform</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="sb-name"></div>
        <div class="user-role" id="sb-role"></div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">Sair da plataforma</button>
    </div>
  </aside>
  <main class="main-content" id="main-content"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- NOTIF -->
<div class="notif" id="notif"></div>

<script>
// ══════════════════════════════════
//  DATA STORE — limpo, sem demo
// ══════════════════════════════════
const DB = {
  users: [],
  auditLog: [],
  messages: { 1:[], 2:[], 3:[], 4:[] }
};

let currentUser  = null;
let currentPage  = null;
let currentAdminChatLevel = 1;

// ══════════════════════════════════
//  HELPERS
// ══════════════════════════════════
const iS = s => `width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:10px 14px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;margin-top:6px;${s||''}`;
function levelName(l)  { return ['','Semente','Raiz','Tronco','Copa'][l]||'—'; }
function levelColor(l) { return ['','#4a9edd','#2ecc8f','#f0a500','#a78bfa'][l]||'#4a9edd'; }
function levelClass(l) { return ['','l1','l2','l3','l4'][l]||'l1'; }
function levelBadge(l) { return `<span class="level-badge badge-${levelClass(l)}">${levelName(l)}</span>`; }
function getInitials(n){ return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }

function showNotif(msg, type='success') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif show ${type}`;
  setTimeout(() => el.classList.remove('show'), 3500);
}
function openModal(title, body, footer, wide=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  const box = document.getElementById('modal-box');
  box.className = wide ? 'modal modal-wide' : 'modal';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target.id==='modal-overlay') closeModal(); });

function addAuditEntry(type, icon, action) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const time = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const entry = { id: Date.now(), type, icon, adminName: currentUser?.name||'Sistema', action, time, ts: Date.now() };
  DB.auditLog.unshift(entry);
  if (window._fbHelpers) window._fbHelpers.addAudit(entry).catch(()=>{});
  const el = document.getElementById('audit-log-body');
  if (el) renderAuditList();
}

// Recalculate progress and points from tasks
function recalcUser(user) {
  if (!user.tasks || !user.tasks.length) { user.progress = 0; return; }
  const done = user.tasks.filter(t=>t.done).length;
  user.progress = Math.round(done / user.tasks.length * 100);
  user.points = user.tasks.filter(t=>t.done).reduce((s,t)=>s+t.points,0);
}

// ══════════════════════════════════
//  AUTH
// ══════════════════════════════════
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email||!pass) { showLoginErr('Preencha e-mail e senha.'); return; }
  const { showLoading, hideLoading, syncUsers, syncAudit, syncMessages } = window._fbHelpers;
  const { auth, signInWithEmailAndPassword } = window._FB;
  showLoading('Autenticando...');
  signInWithEmailAndPassword(auth, email, pass)
    .then(async () => {
      showLoading('Carregando dados...');
      await syncUsers();
      await syncAudit();
      await syncMessages();
      const user = DB.users.find(u => u.email === email);
      if (!user) { hideLoading(); showLoginErr('Usuário não encontrado.'); return; }
      if (user.role !== 'admin' && isSuspendedNow(user)) {
        const s = user.suspended;
        let msg = 'Sua conta está suspensa.';
        if (s?.reason) msg += ' Motivo: ' + s.reason;
        if (s?.type==='timed'&&s?.until) { const d=new Date(s.until); msg+=` Até: ${d.toLocaleDateString('pt-BR')} às ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`; }
        else if (s?.type==='until_unlock') msg += ' Aguarde liberação do administrador.';
        hideLoading(); showLoginErr(msg); return;
      }
      currentUser = user;
      hideLoading();
      document.getElementById('login-err').style.display='none';
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-app').classList.add('active');
      buildShell();
    })
    .catch(() => { hideLoading(); showLoginErr('E-mail ou senha incorretos.'); });
}
function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg; el.style.display='block';
}
function doLogout() {
  const h = window._fbHelpers;
  if (h._chatUnsub) { h._chatUnsub(); h._chatUnsub = null; }
  window._FB?.signOut(window._FB.auth).catch(()=>{});
  window._adminUser = null; currentUser = null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  const banner=document.getElementById('impersonate-banner'); if(banner) banner.remove();
  document.getElementById('screen-app').style.paddingTop='';
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ══════════════════════════════════
//  SHELL
// ══════════════════════════════════
function buildShell() {
  const isAdmin = currentUser.role==='admin';
  const av = document.getElementById('sb-avatar');
  av.textContent = currentUser.avatar;
  av.style.background = currentUser.color;
  av.style.color = '#fff';
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = isAdmin ? 'Administrador' : `Nível ${currentUser.level} — ${levelName(currentUser.level)}`;

  const nav = document.getElementById('sidebar-nav');
  if (isAdmin) {
    nav.innerHTML = `
      <div class="nav-section-title">Administração</div>
      ${ni('admin-overview','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>','Visão Geral')}
      ${ni('admin-users','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3.3 2.2-5 5-5s5 1.7 5 5"/><circle cx="13" cy="6" r="2"/><path d="M13 10c1.7 0 3 1 3 3"/></svg>','Clientes')}
      ${ni('admin-new','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>','Nova Conta')}
      <div class="nav-section-title" style="margin-top:8px;">Monitoramento</div>
      ${ni('admin-ranking','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10V14M8 6V14M13 2V14"/></svg>','Rankings')}
      ${ni('admin-chat','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2z"/></svg>','Chat dos Níveis')}
      ${ni('admin-audit','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M5 6h6M5 9h4"/></svg>','Log de Atividades')}`;
    document.getElementById('main-content').innerHTML = buildAdminOverview()+buildAdminUsers()+buildAdminNew()+buildAdminRanking()+buildAdminChat()+buildAdminAudit();
    navigateTo('admin-overview');
  } else {
    nav.innerHTML = `
      <div class="nav-section-title">Minha Conta</div>
      ${ni('client-dashboard','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>','Dashboard')}
      ${ni('client-progress','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 3"/></svg>','Meu Progresso')}
      ${ni('client-services','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>','Meus Serviços')}
      <div class="nav-section-title" style="margin-top:8px;">Comunidade</div>
      ${ni('client-ranking','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10V14M8 6V14M13 2V14"/></svg>','Ranking do Nível')}
      ${ni('client-chat','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2z"/></svg>','Chat do Nível',true)}
      <div class="nav-section-title" style="margin-top:8px;">Ajuda</div>
      ${ni('client-guide','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1a5 5 0 100 10A5 5 0 008 1zm0 7.5v-1m0-1.5c0-1 .75-1.5 1.5-2a2 2 0 10-3 1.7"/></svg>','Guia da Plataforma')}`;
    document.getElementById('main-content').innerHTML = buildClientDashboard()+buildClientProgress()+buildClientServices()+buildClientRanking()+buildClientChat()+buildClientGuide();
    navigateTo('client-dashboard');
    if (window._adminUser) {
      const banner = document.createElement('div');
      banner.id='impersonate-banner';
      banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9998;background:rgba(240,165,0,0.95);color:#1c1f26;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;font-size:0.82rem;font-weight:600;';
      banner.innerHTML=`<span>👁 Modo visualização: <b>${currentUser.name}</b> — ${currentUser.company}</span><button onclick="exitImpersonation()" style="background:rgba(0,0,0,0.15);border:1px solid rgba(0,0,0,0.2);border-radius:4px;padding:5px 14px;font-weight:700;cursor:pointer;font-size:0.78rem;">← Voltar ao Admin</button>`;
      document.body.appendChild(banner);
      document.getElementById('screen-app').style.paddingTop='40px';
    } else {
      const old=document.getElementById('impersonate-banner'); if(old){old.remove();document.getElementById('screen-app').style.paddingTop='';}
    }
  }
}
function ni(id,icon,label,badge=false) {
  return `<div class="nav-item" id="nav-${id}" onclick="navigateTo('${id}')">${icon}<span>${label}</span>${badge?'<span class="nav-badge">AO VIVO</span>':''}</div>`;
}
function navigateTo(id) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const navEl=document.getElementById('nav-'+id), pageEl=document.getElementById('page-'+id);
  if(navEl) navEl.classList.add('active');
  if(pageEl) pageEl.classList.add('active');
  currentPage=id;
  if(id==='admin-audit') setTimeout(renderAuditList,30);
  if(id==='admin-overview') setTimeout(refreshAdminOverview,30);
  if(id==='admin-ranking') setTimeout(refreshAdminRanking,30);
  if(id==='client-chat'&&currentUser) setTimeout(()=>window._fbHelpers.subscribeChat(currentUser.level,'chat-messages-client'),50);
  if(id==='admin-chat') setTimeout(()=>window._fbHelpers.subscribeChat(currentAdminChatLevel,'chat-messages-admin'),50);
}
function exitImpersonation() {
  currentUser=window._adminUser; window._adminUser=null;
  const b=document.getElementById('impersonate-banner'); if(b) b.remove();
  document.getElementById('screen-app').style.paddingTop='';
  buildShell(); showNotif('Voltou ao painel do administrador.','success');
}

// ══════════════════════════════════
//  SUSPENSION
// ══════════════════════════════════
function isSuspendedNow(u) {
  if (!u.suspended) return false;
  if (u.suspended.type==='until_unlock') return true;
  if (u.suspended.type==='timed'&&u.suspended.until) return new Date(u.suspended.until)>new Date();
  return false;
}

// ══════════════════════════════════
//  CLIENT PAGES
// ══════════════════════════════════
function levelDesc(l) { return ['','Construindo identidade e base da marca','Crescendo presença digital e audiência','Estruturando para escalar resultados','Dominando o mercado com todos os recursos'][l]||''; }

function buildClientDashboard() {
  const u=currentUser, lc=levelClass(u.level), color=levelColor(u.level);
  const tasksDone=u.tasks?u.tasks.filter(t=>t.done).length:0, tasksTotal=u.tasks?u.tasks.length:0;
  const sameLevel=DB.users.filter(x=>x.role==='client'&&x.level===u.level).sort((a,b)=>b.points-a.points);
  const myRank=sameLevel.findIndex(x=>x.id===u.id)+1;
  return `<div class="page" id="page-client-dashboard">
    <div class="page-header">
      <div class="page-title">Olá, ${u.name.split(' ')[0]}! 👋</div>
      <div class="page-subtitle">Bem-vindo à sua plataforma de crescimento — ${u.company}</div>
    </div>
    <div class="level-hero lh-${lc}">
      <div class="level-hero-bg-num">0${u.level}</div>
      <div class="lh-row">
        <div class="lh-orb">0${u.level}</div>
        <div>
          <div style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:${color};font-weight:600;margin-bottom:4px;">Nível Atual</div>
          <div class="lh-title">${levelName(u.level)} — ${u.company}</div>
          <div class="lh-sub">${levelDesc(u.level)}</div>
        </div>
      </div>
      <div class="progress-section">
        <div class="progress-info"><span>Progresso para o próximo nível</span><span class="progress-pct" style="color:${color}">${u.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${u.progress}%;background:${color};"></div></div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:6px;">${tasksTotal-tasksDone} tarefas restantes</div>
      </div>
    </div>
    <div class="stats-row">

function toggleTask(uid, tid) {
  const user=DB.users.find(u=>u.id===uid); if(!user) return;
  const task=user.tasks.find(t=>t.id===tid); if(!task) return;
  task.done=!task.done;
  recalcUser(user);
  showNotif(task.done?`+${task.points} pts! Tarefa concluída!`:'Tarefa desmarcada', task.done?'success':'error');
  window._fbHelpers.patchUser(uid,{tasks:user.tasks,points:user.points,progress:user.progress}).catch(()=>{});
  // If viewing own account, update currentUser reference
  if (currentUser.id===uid) { currentUser.tasks=user.tasks; currentUser.points=user.points; currentUser.progress=user.progress; }
  const cur=currentPage;
  document.getElementById('main-content').innerHTML=buildClientDashboard()+buildClientProgress()+buildClientServices()+buildClientRanking()+buildClientChat()+buildClientGuide();
  navigateTo(cur);
  window._fbHelpers.subscribeChat(user.level,'chat-messages-client');
}

function sendMsg(type) {
  const u=currentUser;
  const input=document.getElementById(`chat-input-${type}`);
  const text=input.value.trim(); if(!text) return;
  const now=new Date(), time=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  const level=type==='admin'?currentAdminChatLevel:u.level;
  const msg={uid:u.id,name:u.name,avatar:u.avatar,color:u.color,text,time,level};
  window._fbHelpers.addMessage(msg).catch(()=>{});
  if(!DB.messages[level]) DB.messages[level]=[];
  DB.messages[level].push(msg);
  input.value='';
  const container=document.getElementById(`chat-messages-${type}`);
  if(container) { const div=document.createElement('div'); div.className='chat-msg mine'; div.innerHTML=`<div class="chat-msg-avatar" style="background:${u.color};color:#fff;">${u.avatar}</div><div><div class="chat-bubble">${text}</div><div class="chat-meta">${time}</div></div>`; container.appendChild(div); container.scrollTop=container.scrollHeight; }
  if(type==='client') { u.points+=20; window._fbHelpers.patchUser(u.id,{points:u.points}).catch(()=>{}); if(currentUser.id===u.id) currentUser.points=u.points; showNotif('+20 pts por participar do networking!','success'); }
}

function solicitarServico(nome) {
  const u=currentUser;
  const msg=`Olá! Sou ${u.name} da empresa *${u.company}*.\nGostaria de solicitar o serviço: *${nome}*.\nMeu nível atual: Nível ${u.level}.`;
  window.open(`https://wa.me/5528999959784?text=${encodeURIComponent(msg)}`,'_blank');
  showNotif('Abrindo WhatsApp da Evastek...','success');
}

function renderAuditList() {
  const search=((document.getElementById('audit-search')||{}).value||'').toLowerCase();
  const entries=DB.auditLog.filter(e=>{
    if(auditFilter!=='all'&&e.type!==auditFilter) return false;

  const typeColors={create:'var(--green)',edit:'var(--accent-light)',delete:'var(--red)',level:'var(--yellow)',suspend:'#a78bfa',unsuspend:'var(--green)',task:'var(--accent-light)'};
  body.innerHTML=entries.map(e=>`
    <div class="audit-item">
      <div class="audit-icon type-${e.type}">${e.icon}</div>
      <div class="audit-content">
        <div class="audit-action">${e.action}</div>

    </div>`).join('');
}

  openModal('Limpar log','<p style="color:var(--muted);font-size:0.9rem;line-height:1.6;">Tem certeza que deseja apagar todo o histórico?</p>',

//  ADMIN ACTIONS — CRIAR CONTA
// ══════════════════════════════════
function createUser() {
  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const pass=document.getElementById('new-pass').value;
  const isAdmin=newAccountType==='admin';
  if(!name||!email||!pass){showNotif('Preencha nome, e-mail e senha!','error');return;}
  if(DB.users.find(u=>u.email===email)){showNotif('Este e-mail já está cadastrado!','error');return;}
  const {showLoading,hideLoading,saveUser,syncUsers}=window._fbHelpers;
  const {auth,createUserWithEmailAndPassword,signInWithEmailAndPassword}=window._FB;
  const colors=['#4a9edd','#2ecc8f','#f0a500','#a78bfa','#ff6b6b','#06d6a0','#e879f9','#38bdf8'];
  const color=colors[DB.users.length%colors.length];
  showLoading('Criando conta...');
  createUserWithEmailAndPassword(auth,email,pass)
    .then(async cred=>{
      const uid=cred.user.uid;
      let newUser;
      if(isAdmin) {
        newUser={id:uid,name,email,pass,role:'admin',company:'Evastek',level:0,progress:100,points:0,avatar:getInitials(name),color:'#1a5fa8',suspended:null};
        addAuditEntry('create','🛡️','Criou conta de administrador para <b>'+name+'</b>');
      } else {
        const company=document.getElementById('new-company').value.trim();
        const level=parseInt(document.getElementById('new-level').value);
        if(!company){hideLoading();showNotif('Informe o nome da empresa!','error');return;}
        // New clients start with NO tasks — admin adds them via task editor
        newUser={id:uid,name,email,pass,role:'client',company,level,progress:0,points:0,avatar:getInitials(name),color,tasks:[],suspended:null};
        addAuditEntry('create','✅','Criou conta do cliente <b>'+name+'</b> ('+company+') — Nível '+level);
      }
      await saveUser(newUser);
      await syncUsers();
      // Re-sign in as admin
      const adminEmail=currentUser.email, adminPass=currentUser.pass;
      await signInWithEmailAndPassword(auth,adminEmail,adminPass).catch(()=>{});
      hideLoading();
      showNotif((isAdmin?'Administrador ':'Cliente ')+name+' criado com sucesso!','success');
      ['new-name','new-email','new-pass','new-company'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
      const al=document.getElementById('all-accounts-list'); if(al) al.innerHTML=buildAccountsList();
      const sub=document.getElementById('users-subtitle'); if(sub) sub.textContent=DB.users.filter(u=>u.role==='client').length+' contas cadastradas';
    })
    .catch(err=>{hideLoading();showNotif('Erro: '+(err.message||err.code),'error');});
}

    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" onclick="saveEditUser('${uid}')">💾 Salvar</button>`);

function saveEditUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const newLevel=parseInt(document.getElementById('edit-level').value);
  const levelChanged=newLevel!==u.level;
  u.name=document.getElementById('edit-name').value.trim()||u.name;
  u.company=document.getElementById('edit-company').value.trim()||u.company;
  u.email=document.getElementById('edit-email').value.trim()||u.email;
  const np=document.getElementById('edit-pass').value; if(np) u.pass=np;
  u.level=newLevel;
  u.progress=parseInt(document.getElementById('edit-progress').value)||0;
  u.points=parseInt(document.getElementById('edit-points').value)||0;
  u.avatar=getInitials(u.name);
  if(levelChanged) addAuditEntry('level','🔄','Alterou nível de <b>'+u.name+'</b> ('+u.company+') para Nível '+u.level);
  else addAuditEntry('edit','✏️','Editou dados de <b>'+u.name+'</b> ('+u.company+')');
  window._fbHelpers.patchUser(uid,{name:u.name,company:u.company,email:u.email,pass:u.pass,level:u.level,progress:u.progress,points:u.points,avatar:u.avatar,tasks:u.tasks||[]}).catch(()=>{});
  showNotif('Cliente atualizado!','success');
  closeModal();
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function renderTaskEditorModal(u) {
  const tasks=u.tasks||[];
  const taskRows=tasks.map((t,i)=>`

      <div class="task-done-toggle ${t.done?'':''}/" style="border-color:${t.done?'var(--green)':'var(--border)'};background:${t.done?'var(--green)':'transparent'};" onclick="toggleTaskDoneAdmin('${u.id}',${t.id},this)" title="${t.done?'Clique para desmarcar':'Clique para marcar como feita'}">
        ${t.done?'<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5"><path d="M2 5l2.5 2.5L8 3"/></svg>':''}

      <button class="btn btn-danger btn-sm" style="flex-shrink:0;" onclick="removeTaskRow('${u.id}',${t.id})">✕</button>
    </div>`).join('');

  const body=`
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:0.82rem;font-weight:500;">${u.company} — ${levelBadge(u.level)}</div>

      </div>
      <button class="btn btn-accent btn-sm" onclick="addTaskRowTemplate('${u.id}')">+ Adicionar tarefa</button>
    </div>
    <div style="background:rgba(74,158,221,0.06);border:1px solid rgba(74,158,221,0.2);border-radius:4px;padding:8px 12px;margin-bottom:14px;font-size:0.75rem;color:var(--muted);">
      <b style="color:var(--accent-light);">Como usar:</b> edite o texto e os pontos de cada tarefa. Clique no círculo para marcar/desmarcar como concluída. Clique ✕ para remover.
    </div>
    <div style="display:grid;grid-template-columns:24px 1fr 70px 30px 36px;gap:6px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px;">
      <div style="font-size:0.65rem;color:var(--muted);text-align:center;">✓</div>
      <div style="font-size:0.65rem;color:var(--muted);">Descrição</div>
      <div style="font-size:0.65rem;color:var(--muted);text-align:center;">Pts</div>
      <div></div><div></div>
    </div>
    <div id="task-editor-rows" style="max-height:340px;overflow-y:auto;">${taskRows||'<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Nenhuma tarefa. Clique em "+ Adicionar tarefa".</div>'}</div>
    <div style="margin-top:14px;">
      <div style="background:rgba(46,204,143,0.06);border:1px solid rgba(46,204,143,0.2);border-radius:4px;padding:8px 12px;font-size:0.75rem;color:var(--muted);">
        <b style="color:var(--green);">Modelos rápidos:</b>&nbsp;
        ${[1,2,3,4].map(l=>`<button class="btn btn-ghost btn-sm" style="font-size:0.65rem;padding:3px 8px;margin:2px;" onclick="applyTaskTemplate('${u.id}',${l})">Nível ${l}</button>`).join('')}
      </div>
    </div>`;

  openModal(`📋 Tarefas — ${u.name}`, body,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" onclick="saveTaskEditor('${u.id}')">💾 Salvar tarefas</button>`, true);
}

function toggleTaskDoneAdmin(uid, tid, el) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  if(!u.tasks) u.tasks=[];
  const task=u.tasks.find(t=>t.id===tid); if(!task) return;
  task.done=!task.done;
  el.style.borderColor=task.done?'var(--green)':'var(--border)';
  el.style.background=task.done?'var(--green)':'transparent';
  el.innerHTML=task.done?'<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5"><path d="M2 5l2.5 2.5L8 3"/></svg>':'';
}

function removeTaskRow(uid, tid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  u.tasks=(u.tasks||[]).filter(t=>t.id!==tid);
  const row=document.getElementById('task-row-'+tid); if(row) row.remove();
  // Update count
  const container=document.getElementById('task-editor-rows');
  if(container&&!container.querySelector('.task-edit-row')) container.innerHTML='<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Nenhuma tarefa. Clique em "+ Adicionar tarefa".</div>';
}

let _taskNextId=Date.now();
function addTaskRowTemplate(uid) {
  _taskNextId++;
  const id=_taskNextId;
  const u=DB.users.find(x=>x.id===uid);
  const container=document.getElementById('task-editor-rows');
  if(!container) return;
  // Remove empty state message if present
  if(container.querySelector('div:not(.task-edit-row)')) container.innerHTML='';
  const row=document.createElement('div');
  row.className='task-edit-row'; row.id='task-row-'+id;
  row.innerHTML=`
    <div class="task-done-toggle" style="border-color:var(--border);background:transparent;" onclick="toggleTaskDoneAdmin('${uid}',${id},this)" title="Marcar como feita"></div>
    <input type="text" id="task-label-${id}" placeholder="Descreva a tarefa..."/>
    <input type="number" id="task-pts-${id}" value="30" min="1" max="500" title="Pontos"/>
    <span style="font-size:0.65rem;color:var(--muted);white-space:nowrap;">pts</span>
    <button class="btn btn-danger btn-sm" style="flex-shrink:0;" onclick="removeTaskRow('${uid}',${id})">✕</button>`;
  container.appendChild(row);
  // Register as pending task in user object so toggle works
  if(u) { if(!u.tasks) u.tasks=[]; u.tasks.push({id,label:'',points:30,done:false}); }
  document.getElementById('task-label-'+id)?.focus();
}

function applyTaskTemplate(uid, level) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const templates=levelTaskTemplates(level);
  u.tasks=templates.map((t,i)=>({...t,done:false}));
  renderTaskEditorModal(u);
}

function saveTaskEditor(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const rows=document.querySelectorAll('.task-edit-row');
  const newTasks=[];
  rows.forEach((row,i)=>{
    const idMatch=row.id.match(/task-row-(\d+)/); if(!idMatch) return;
    const tid=parseInt(idMatch[1]);
    const labelEl=document.getElementById('task-label-'+tid);
    const ptsEl=document.getElementById('task-pts-'+tid);
    const label=labelEl?labelEl.value.trim():'';
    const pts=ptsEl?parseInt(ptsEl.value)||10:10;
    // Check done state from existing tasks
    const existing=(u.tasks||[]).find(t=>t.id===tid);
    const done=existing?existing.done:false;
    if(label) newTasks.push({id:i+1,label,points:pts,done});
  });
  u.tasks=newTasks;
  recalcUser(u);
  window._fbHelpers.patchUser(uid,{tasks:u.tasks,points:u.points,progress:u.progress}).catch(()=>{});
  addAuditEntry('task','📋','Atualizou tarefas de <b>'+u.name+'</b> ('+u.company+') — '+newTasks.length+' tarefa'+(newTasks.length!==1?'s':''));
  showNotif('Tarefas salvas com sucesso!','success');
  closeModal();
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

// ══════════════════════════════════
//  ADMIN ACTIONS — OUTROS
// ══════════════════════════════════
function quickLevelUp(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u||u.level>=4){showNotif('Já está no nível máximo!','error');return;}
  const old=u.level; u.level++;
  addAuditEntry('level','⬆️','Avançou <b>'+u.name+'</b> ('+u.company+') de Nível '+old+' para Nível '+u.level);
  window._fbHelpers.patchUser(uid,{level:u.level}).catch(()=>{});
  showNotif(u.name+' avançou para Nível '+u.level+' — '+levelName(u.level)+'!','success');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function quickLevelDown(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u||u.level<=1){showNotif('Já está no nível mínimo!','error');return;}
  const old=u.level; u.level--;
  addAuditEntry('level','⬇️','Regrediu <b>'+u.name+'</b> ('+u.company+') de Nível '+old+' para Nível '+u.level);
  window._fbHelpers.patchUser(uid,{level:u.level}).catch(()=>{});
  showNotif(u.name+' regrediu para Nível '+u.level+' — '+levelName(u.level)+'.','error');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function deleteUser(uid) {
  openModal('Remover cliente','<p style="color:var(--muted);font-size:0.9rem;line-height:1.6;">Tem certeza que deseja remover este cliente? Esta ação não pode ser desfeita.</p>',
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="confirmDelete('${uid}')">Remover cliente</button>`);
}

function confirmDelete(uid) {
  const u=DB.users.find(x=>x.id===uid);
  const label=u?u.name+' ('+u.company+')':'#'+uid;
  DB.users.splice(DB.users.findIndex(u=>u.id===uid),1);
  window._fbHelpers.removeUser(uid).catch(()=>{});
  addAuditEntry('delete','🗑️','Removeu a conta de <b>'+label+'</b>');
  closeModal();
  showNotif('Cliente removido.','error');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
  const sub=document.getElementById('users-subtitle'); if(sub) sub.textContent=DB.users.filter(u=>u.role==='client').length+' contas cadastradas';
}

function viewCredentials(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const s=iS();
  openModal('🔑 Credenciais — '+u.company,
    `<div style="margin-bottom:16px;"><div style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">E-mail</div>
     <div style="display:flex;gap:8px;"><input type="text" id="cred-email" value="${u.email}" readonly style="${s}cursor:text;"/><button class="btn btn-ghost btn-sm" onclick="copyToClip('cred-email')" style="flex-shrink:0;">Copiar</button></div></div>
     <div style="margin-bottom:16px;"><div style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Senha</div>
     <div style="display:flex;gap:8px;"><input type="text" id="cred-pass" value="${u.pass}" readonly style="${s}cursor:text;font-family:monospace;"/><button class="btn btn-ghost btn-sm" onclick="copyToClip('cred-pass')" style="flex-shrink:0;">Copiar</button></div></div>
     <div style="background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.2);border-radius:4px;padding:10px 14px;font-size:0.78rem;color:var(--muted);">⚠️ Não compartilhe com terceiros.</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Fechar</button><button class="btn btn-accent" onclick="impersonateUser('${uid}');closeModal();">👁 Entrar como cliente</button>`);
}

function copyToClip(inputId) {
  const el=document.getElementById(inputId); if(!el) return;
  navigator.clipboard.writeText(el.value).then(()=>showNotif('Copiado!','success')).catch(()=>{el.select();document.execCommand('copy');showNotif('Copiado!','success');});
}

function impersonateUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  window._adminUser=currentUser; currentUser=u;
  buildShell(); showNotif('Visualizando como: '+u.name+' ('+u.company+')','success');
}

// ══════════════════════════════════
//  SUSPENSÃO
// ══════════════════════════════════
function openSuspendModal(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const s=iS();
  _suspOpt='points'; _suspUid=uid;
  openModal('🚫 Suspender — '+u.name,
    `<div style="background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.2);border-radius:4px;padding:10px 14px;font-size:0.82rem;color:var(--muted);margin-bottom:16px;">⚠️ <b style="color:var(--light);">${u.name}</b> (${u.company}) não conseguirá fazer login enquanto suspenso.</div>
    <div class="field"><label>Motivo da suspensão</label><input type="text" id="susp-reason" placeholder="Ex: Inadimplência..." style="${s}"/></div>
    <div style="margin-top:16px;margin-bottom:6px;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:600;">Tipo de suspensão</div>
    <div class="suspend-modal-opts">
      <div class="suspend-opt selected" id="sopt-points" onclick="selectSuspOpt('points')"><input type="radio" name="susp-type" value="points" checked/><label><b>Penalidade de pontos</b> — Remove pontos e mantém acesso</label></div>
      <div class="suspend-opt" id="sopt-until_unlock" onclick="selectSuspOpt('until_unlock')"><input type="radio" name="susp-type" value="until_unlock"/><label><b>Bloquear até admin liberar</b> — Impede login até desbloqueio manual</label></div>
      <div class="suspend-opt" id="sopt-timed" onclick="selectSuspOpt('timed')"><input type="radio" name="susp-type" value="timed"/><label><b>Suspensão por tempo</b> — Define data/hora de término</label></div>
    </div>
    <div id="susp-points-config" style="margin-top:12px;"><div class="field"><label>Pontos a remover (atual: ${u.points} pts)</label><input type="number" id="susp-points-val" value="50" min="1" max="${u.points||1}" style="${s}"/></div></div>
    <div id="susp-timed-config" style="display:none;margin-top:12px;"><div class="field"><label>Suspender até (data e hora)</label><input type="datetime-local" id="susp-until" style="${s}" value="${defaultSuspDate()}"/></div></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="applySuspension('${uid}')">🚫 Aplicar suspensão</button>`);
}

function defaultSuspDate() { const d=new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,16); }
let _suspOpt='points', _suspUid=null;
function selectSuspOpt(val) {
  _suspOpt=val;
  ['points','until_unlock','timed'].forEach(o=>{ const el=document.getElementById('sopt-'+o); if(el){el.classList.toggle('selected',o===val); const r=el.querySelector('input[type=radio]'); if(r) r.checked=(o===val);} });
  document.getElementById('susp-points-config').style.display=val==='points'?'block':'none';
  document.getElementById('susp-timed-config').style.display=val==='timed'?'block':'none';
}

function applySuspension(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const reason=(document.getElementById('susp-reason').value||'').trim();
  if(_suspOpt==='points') {
    const pts=parseInt(document.getElementById('susp-points-val').value)||50;
    const removed=Math.min(pts,u.points);
    u.points=Math.max(0,u.points-removed);
    window._fbHelpers.patchUser(uid,{points:u.points}).catch(()=>{});
    addAuditEntry('suspend','⚡','Aplicou penalidade de <b>-'+removed+' pts</b> a <b>'+u.name+'</b>'+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif('-'+removed+' pts aplicados a '+u.name,'error');
  } else if(_suspOpt==='until_unlock') {
    u.suspended={type:'until_unlock',reason,suspendedAt:new Date().toISOString(),suspendedBy:currentUser.name};
    window._fbHelpers.patchUser(uid,{suspended:u.suspended}).catch(()=>{});
    addAuditEntry('suspend','🚫','Bloqueou <b>'+u.name+'</b> até desbloqueio manual'+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif(u.name+' bloqueado até desbloqueio.','error');
  } else if(_suspOpt==='timed') {
    const until=document.getElementById('susp-until').value;
    if(!until){showNotif('Defina a data de término!','error');return;}
    u.suspended={type:'timed',reason,until:new Date(until).toISOString(),suspendedBy:currentUser.name};
    window._fbHelpers.patchUser(uid,{suspended:u.suspended}).catch(()=>{});
    const dStr=new Date(until).toLocaleDateString('pt-BR');
    addAuditEntry('suspend','⏳','Suspendeu <b>'+u.name+'</b> até '+dStr+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif(u.name+' suspenso até '+dStr+'.','error');
  }
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function unsuspendUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  u.suspended=null;
  window._fbHelpers.patchUser(uid,{suspended:null}).catch(()=>{});
  addAuditEntry('unsuspend','🔓','Desbloqueou a conta de <b>'+u.name+'</b> ('+u.company+')');
  showNotif(u.name+' desbloqueado!','success');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}
</script>
