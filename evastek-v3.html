// ══════════════════════════════════
//  ADMIN ACTIONS — OUTROS
// ══════════════════════════════════
function quickLevelUp(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u||u.level>=4){showNotif('Já está no nível máximo!','error');return;}
  const old=u.level; u.level++;
  addAuditEntry('level','⬆️','Avançou <b>'+u.name+'</b> ('+u.company+') de Nível '+old+' para Nível '+u.level);
  fbPatchUser(uid,{level:u.level}).catch(()=>{});
  showNotif(u.name+' avançou para Nível '+u.level+' — '+levelName(u.level)+'!','success');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function quickLevelDown(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u||u.level<=1){showNotif('Já está no nível mínimo!','error');return;}
  const old=u.level; u.level--;
  addAuditEntry('level','⬇️','Regrediu <b>'+u.name+'</b> ('+u.company+') de Nível '+old+' para Nível '+u.level);
  fbPatchUser(uid,{level:u.level}).catch(()=>{});
  showNotif(u.name+' regrediu para Nível '+u.level+' — '+levelName(u.level)+'.','error');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function deleteUser(uid) {
  openModal('Remover cliente','<p style="color:var(--muted);font-size:0.9rem;line-height:1.6;">Tem certeza que deseja remover este cliente? Esta ação não pode ser desfeita.</p>',
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="confirmDelete('${uid}')">Remover cliente</button>`);
}

function confirmDelete(uid) {
  const u=DB.users.find(x=>x.id===uid);
  const label=u?u.name+' ('+u.company+')':'#'+uid;
  DB.users.splice(DB.users.findIndex(u=>u.id===uid),1);
  fbRemoveUser(uid).catch(()=>{});
  addAuditEntry('delete','🗑️','Removeu a conta de <b>'+label+'</b>');
  closeModal();
  showNotif('Cliente removido.','error');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
  const sub=document.getElementById('users-subtitle'); if(sub) sub.textContent=DB.users.filter(u=>u.role==='client').length+' contas cadastradas';
}

function viewCredentials(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const s=iS();
  openModal('🔑 Credenciais — '+u.company,
    `<div style="margin-bottom:16px;"><div style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">E-mail</div>
     <div style="display:flex;gap:8px;"><input type="text" id="cred-email" value="${u.email}" readonly style="${s}cursor:text;"/><button class="btn btn-ghost btn-sm" onclick="copyToClip('cred-email')" style="flex-shrink:0;">Copiar</button></div></div>
     <div style="margin-bottom:16px;"><div style="font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Senha</div>
     <div style="display:flex;gap:8px;"><input type="text" id="cred-pass" value="${u.pass}" readonly style="${s}cursor:text;font-family:monospace;"/><button class="btn btn-ghost btn-sm" onclick="copyToClip('cred-pass')" style="flex-shrink:0;">Copiar</button></div></div>
     <div style="background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.2);border-radius:4px;padding:10px 14px;font-size:0.78rem;color:var(--muted);">⚠️ Não compartilhe com terceiros.</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Fechar</button><button class="btn btn-accent" onclick="impersonateUser('${uid}');closeModal();">👁 Entrar como cliente</button>`);
}

function copyToClip(inputId) {
  const el=document.getElementById(inputId); if(!el) return;
  navigator.clipboard.writeText(el.value).then(()=>showNotif('Copiado!','success')).catch(()=>{el.select();document.execCommand('copy');showNotif('Copiado!','success');});
}

function impersonateUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  window._adminUser=currentUser; currentUser=u;
  buildShell(); showNotif('Visualizando como: '+u.name+' ('+u.company+')','success');
}

// ══════════════════════════════════
//  SUSPENSÃO
// ══════════════════════════════════
function openSuspendModal(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const s=iS();
  _suspOpt='points'; _suspUid=uid;
  openModal('🚫 Suspender — '+u.name,
    `<div style="background:rgba(255,92,92,0.06);border:1px solid rgba(255,92,92,0.2);border-radius:4px;padding:10px 14px;font-size:0.82rem;color:var(--muted);margin-bottom:16px;">⚠️ <b style="color:var(--light);">${u.name}</b> (${u.company}) não conseguirá fazer login enquanto suspenso.</div>
    <div class="field"><label>Motivo da suspensão</label><input type="text" id="susp-reason" placeholder="Ex: Inadimplência..." style="${s}"/></div>
    <div style="margin-top:16px;margin-bottom:6px;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:600;">Tipo de suspensão</div>
    <div class="suspend-modal-opts">
      <div class="suspend-opt selected" id="sopt-points" onclick="selectSuspOpt('points')"><input type="radio" name="susp-type" value="points" checked/><label><b>Penalidade de pontos</b> — Remove pontos e mantém acesso</label></div>
      <div class="suspend-opt" id="sopt-until_unlock" onclick="selectSuspOpt('until_unlock')"><input type="radio" name="susp-type" value="until_unlock"/><label><b>Bloquear até admin liberar</b> — Impede login até desbloqueio manual</label></div>
      <div class="suspend-opt" id="sopt-timed" onclick="selectSuspOpt('timed')"><input type="radio" name="susp-type" value="timed"/><label><b>Suspensão por tempo</b> — Define data/hora de término</label></div>
    </div>
    <div id="susp-points-config" style="margin-top:12px;"><div class="field"><label>Pontos a remover (atual: ${u.points} pts)</label><input type="number" id="susp-points-val" value="50" min="1" max="${u.points||1}" style="${s}"/></div></div>
    <div id="susp-timed-config" style="display:none;margin-top:12px;"><div class="field"><label>Suspender até (data e hora)</label><input type="datetime-local" id="susp-until" style="${s}" value="${defaultSuspDate()}"/></div></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="applySuspension('${uid}')">🚫 Aplicar suspensão</button>`);
}

function defaultSuspDate() { const d=new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,16); }
let _suspOpt='points', _suspUid=null;
function selectSuspOpt(val) {
  _suspOpt=val;
  ['points','until_unlock','timed'].forEach(o=>{ const el=document.getElementById('sopt-'+o); if(el){el.classList.toggle('selected',o===val); const r=el.querySelector('input[type=radio]'); if(r) r.checked=(o===val);} });
  document.getElementById('susp-points-config').style.display=val==='points'?'block':'none';
  document.getElementById('susp-timed-config').style.display=val==='timed'?'block':'none';
}

function applySuspension(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const reason=(document.getElementById('susp-reason').value||'').trim();
  if(_suspOpt==='points') {
    const pts=parseInt(document.getElementById('susp-points-val').value)||50;
    const removed=Math.min(pts,u.points);
    u.points=Math.max(0,u.points-removed);
    fbPatchUser(uid,{points:u.points}).catch(()=>{});
    addAuditEntry('suspend','⚡','Aplicou penalidade de <b>-'+removed+' pts</b> a <b>'+u.name+'</b>'+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif('-'+removed+' pts aplicados a '+u.name,'error');
  } else if(_suspOpt==='until_unlock') {
    u.suspended={type:'until_unlock',reason,suspendedAt:new Date().toISOString(),suspendedBy:currentUser.name};
    fbPatchUser(uid,{suspended:u.suspended}).catch(()=>{});
    addAuditEntry('suspend','🚫','Bloqueou <b>'+u.name+'</b> até desbloqueio manual'+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif(u.name+' bloqueado até desbloqueio.','error');
  } else if(_suspOpt==='timed') {
    const until=document.getElementById('susp-until').value;
    if(!until){showNotif('Defina a data de término!','error');return;}
    u.suspended={type:'timed',reason,until:new Date(until).toISOString(),suspendedBy:currentUser.name};
    fbPatchUser(uid,{suspended:u.suspended}).catch(()=>{});
    const dStr=new Date(until).toLocaleDateString('pt-BR');
    addAuditEntry('suspend','⏳','Suspendeu <b>'+u.name+'</b> até '+dStr+(reason?' — Motivo: '+reason:''));
    closeModal(); showNotif(u.name+' suspenso até '+dStr+'.','error');
  }
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

function unsuspendUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  u.suspended=null;
  fbPatchUser(uid,{suspended:null}).catch(()=>{});
  addAuditEntry('unsuspend','🔓','Desbloqueou a conta de <b>'+u.name+'</b> ('+u.company+')');
  showNotif(u.name+' desbloqueado!','success');
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}
</script>
