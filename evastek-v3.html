<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evastek Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<!-- Firebase Compat SDK v9.23.0 — última versão estável do Compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════
//  FIREBASE INIT — Compat SDK (window.firebase disponível)
// ══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDUuFK_7atCyD2p9x2igCAqsVgwqzXGxfE",
  authDomain: "evastek-6e62c.firebaseapp.com",
  projectId: "evastek-6e62c",
  storageBucket: "evastek-6e62c.firebasestorage.app",
  messagingSenderId: "852647780160",
  appId: "1:852647780160:web:64a93580cf11878fc2e4a5"
};
firebase.initializeApp(firebaseConfig);
const _auth = firebase.auth();
const _db   = firebase.firestore();

// ── DB Helpers ──
async function fbSyncUsers() {
  const snap = await _db.collection('users').get();
  DB.users = [];
  snap.forEach(d => DB.users.push({ ...d.data(), id: d.id }));
}
async function fbSyncAudit() {
  DB.auditLog = [];
  try {
    const snap = await _db.collection('auditLog').get();
    snap.forEach(d => DB.auditLog.push({ ...d.data(), id: d.id }));
    // Ordenar do mais recente para o mais antigo em memória
    DB.auditLog.sort((a,b) => (b.ts||0) - (a.ts||0));
  } catch(e) { console.warn('fbSyncAudit error:', e.message); }
}
async function fbSyncMessages() {
  DB.messages = {1:[],2:[],3:[],4:[]};
  try {
    // Sem orderBy para não exigir índice composto no Firestore
    const snap = await _db.collection('messages').get();
    snap.forEach(d => {
      const m = d.data(), l = m.level;
      if (!DB.messages[l]) DB.messages[l] = [];
      DB.messages[l].push({ ...m, docId: d.id });
    });
    // Ordenar em memória por ts (pode ser Timestamp ou número)
    Object.keys(DB.messages).forEach(l => {
      DB.messages[l].sort((a,b) => {
        const ta = a.ts && a.ts.toMillis ? a.ts.toMillis() : (a.ts||0);
        const tb = b.ts && b.ts.toMillis ? b.ts.toMillis() : (b.ts||0);
        return ta - tb;
      });
    });
  } catch(e) { console.warn('fbSyncMessages error:', e.message); }
}
async function fbSyncInvestments() {
  DB.investments = {};
  try {
    const snap = await _db.collection('investments').get();
    snap.forEach(d => { DB.investments[d.id] = d.data(); });
  } catch(e) {}
}
async function fbSaveUser(user) {
  const { id, ...data } = user;
  await _db.collection('users').doc(String(id)).set(data);
}
async function fbPatchUser(uid, fields) {
  await _db.collection('users').doc(String(uid)).update(fields);
}
async function fbRemoveUser(uid) {
  await _db.collection('users').doc(String(uid)).delete();
}
async function fbAddMessage(msg) {
  const ref = await _db.collection('messages').add({ ...msg, ts: firebase.firestore.FieldValue.serverTimestamp() });
  return ref.id;
}
async function fbDeleteMessage(docId) {
  await _db.collection('messages').doc(String(docId)).delete();
}
async function fbAddAudit(entry) {
  try { await _db.collection('auditLog').add({ ...entry, ts: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
}

let _chatUnsub = null;
// ── Chat subscriptions: one per level, persistent while logged in ──
const _chatUnsubs = {};   // level → unsubscribe fn
const _chatContainers = {}; // level → current container id

// Track last seen message counts per level
const _lastSeenCount = {};
let _unreadCount = 0;

function renderChatMessages(level) {
  const containerId = _chatContainers[level];
  if (!containerId || !currentUser) return;
  const el = document.getElementById(containerId);
  const msgs = DB.messages[level] || [];
  const isAdmin = currentUser.role === 'admin';

  // Track unread — notify if user not on chat page
  const prevCount = _lastSeenCount[level] || 0;
  const newCount = msgs.length;
  const isOnChatPage = (currentPage === 'client-chat' || currentPage === 'admin-chat');

  if (newCount > prevCount && prevCount > 0 && !isOnChatPage) {
    const newest = msgs[msgs.length - 1];
    if (newest && newest.uid !== currentUser.id) {
      _unreadCount += (newCount - prevCount);
      updateUnreadBadge();
      // Toast notification for new message
      showNotif('💬 Nova mensagem de ' + newest.name + ': ' + newest.text.substring(0,40) + (newest.text.length>40?'...':''), 'success');
    }
  }
  if (isOnChatPage) {
    _unreadCount = 0;
    updateUnreadBadge();
  }
  _lastSeenCount[level] = newCount;

  if (!el) return;

  if (!msgs.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:40px 0;">Nenhuma mensagem ainda neste nível.</div>';
    return;
  }

  // Smart scroll: only auto-scroll if user was near bottom
  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;

  el.innerHTML = msgs.map(m => {
    const isMine = m.uid === currentUser.id;
    const canDel = isAdmin || isMine;
    const delBtn = (canDel && m.docId) ? '<button class="chat-del-btn" onclick="deleteMsg(\'' + m.docId + '\')" title="Apagar">✕</button>' : '';
    const nameEl = !isMine ? '<div style="font-size:0.72rem;color:var(--muted);margin-bottom:3px;">' + m.name + '</div>' : '';
    const dir = isMine ? 'flex-direction:row-reverse;' : '';
    return '<div class="chat-msg ' + (isMine?'mine':'') + '">' +
      '<div class="chat-msg-avatar" style="background:' + m.color + ';color:#fff;">' + m.avatar + '</div>' +
      '<div style="max-width:75%;">' + nameEl +
        '<div class="chat-bubble-wrap" style="display:flex;align-items:flex-end;gap:6px;' + dir + '">' +
          '<div class="chat-bubble' + (m.role==='admin'?' admin-bubble':'') + '">' + (m.role==='admin'?'<span class="admin-tag">👑 Admin</span>':'') + m.text + '</div>' + delBtn +
        '</div>' +
        '<div class="chat-meta">' + m.time + '</div>' +
      '</div></div>';
  }).join('');

  if (wasAtBottom) el.scrollTop = el.scrollHeight;
}

function updateUnreadBadge() {
  // Find the chat nav item and update badge
  const chatNavId = currentUser && currentUser.role === 'admin' ? 'nav-admin-chat' : 'nav-client-chat';
  const navEl = document.getElementById(chatNavId);
  if (!navEl) return;
  let badge = navEl.querySelector('.nav-badge-count');
  if (_unreadCount > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'nav-badge-count';
      // Remove AO VIVO badge temporarily
      const liveBadge = navEl.querySelector('.nav-badge');
      if (liveBadge) liveBadge.style.display = 'none';
      navEl.appendChild(badge);
    }
    badge.textContent = _unreadCount > 99 ? '99+' : _unreadCount;
  } else {
    if (badge) badge.remove();
    const liveBadge = navEl.querySelector('.nav-badge');
    if (liveBadge) liveBadge.style.display = '';
  }
}

function fbSubscribeChat(level, containerId) {
  // Update which container this level should render into
  _chatContainers[level] = containerId;

  // Already subscribed to this level — just re-render into new container
  if (_chatUnsubs[level]) {
    renderChatMessages(level);
    return;
  }

  // New subscription
  // Sem orderBy — evita exigência de índice composto no Firestore
  // Ordenação feita em memória após cada snapshot
  const unsub = _db.collection('messages')
    .where('level','==',level)
    .onSnapshot(snap => {
      const msgs = [];
      snap.forEach(d => msgs.push({ ...d.data(), docId: d.id }));
      // Ordenar por ts em memória
      msgs.sort((a,b) => {
        const ta = a.ts && a.ts.toMillis ? a.ts.toMillis() : (a.ts||0);
        const tb = b.ts && b.ts.toMillis ? b.ts.toMillis() : (b.ts||0);
        return ta - tb;
      });
      DB.messages[level] = msgs;
      renderChatMessages(level);
    }, err => {
      console.warn('Chat listener error:', err.message);
      delete _chatUnsubs[level];
      setTimeout(() => fbSubscribeChat(level, _chatContainers[level] || containerId), 4000);
    });
  _chatUnsubs[level] = unsub;
}

function fbUnsubscribeAllChats() {
  Object.values(_chatUnsubs).forEach(unsub => { try { unsub(); } catch(e){} });
  Object.keys(_chatUnsubs).forEach(k => delete _chatUnsubs[k]);
}

// Legacy alias — variável já declarada acima

function showFBLoading(msg) {
  let el = document.getElementById('fb-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'fb-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(28,31,38,0.94);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    el.innerHTML = '<div style="width:36px;height:36px;border:3px solid rgba(74,158,221,0.3);border-top-color:#4a9edd;border-radius:50%;animation:fbspin 0.8s linear infinite;"></div><div id="fb-msg" style="font-size:0.88rem;color:#8a9ab0;"></div>';
    const s = document.createElement('style'); s.textContent='@keyframes fbspin{to{transform:rotate(360deg)}}'; document.head.appendChild(s);
    document.body.appendChild(el);
  } else { el.style.display='flex'; }
  const m = document.getElementById('fb-msg'); if(m) m.textContent = msg||'Carregando...';
}
function hideFBLoading() { const el=document.getElementById('fb-loading'); if(el) el.style.display='none'; }

// ══════════════════════════════════════════════════════════
//  TYPING INDICATOR — Firestore realtime
// ══════════════════════════════════════════════════════════
const _typingUnsubs  = {};  // level → unsub fn
const _typingTimeouts = {}; // level → timeout id

function fbSetTyping(level, isTyping) {
  if (!currentUser || !level) return;
  const docId = String(level) + '_' + String(currentUser.id);
  if (isTyping) {
    _db.collection('typing').doc(docId).set({
      uid: currentUser.id, name: currentUser.name, level: level,
      typing: true, ts: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  } else {
    _db.collection('typing').doc(docId).delete().catch(()=>{});
  }
}

function fbSubscribeTyping(level, containerId) {
  if (_typingUnsubs[level]) return; // already subscribed
  const unsub = _db.collection('typing').where('level','==',level)
    .onSnapshot(snap => {
      if (!currentUser) return;
      const names = [];
      const now = Date.now();
      snap.forEach(d => {
        const data = d.data();
        if (data.uid === currentUser.id) return;
        const ts = data.ts?.toMillis ? data.ts.toMillis() : (data.ts||0);
        if (data.typing && (now - ts) < 6000) names.push(data.name.split(' ')[0]);
      });
      const indId = 'typing-ind-' + containerId;
      const el = document.getElementById(indId);
      if (!el) return;
      if (names.length) {
        const label = names.length === 1
          ? names[0] + ' está digitando'
          : names.slice(0,-1).join(', ') + ' e ' + names[names.length-1] + ' estão digitando';
        el.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span><span>' + label + '...</span>';
        el.style.display = 'flex';
      } else {
        el.style.display = 'none';
      }
    }, () => { delete _typingUnsubs[level]; });
  _typingUnsubs[level] = unsub;
}

// ══════════════════════════════════════════════════════════
//  PRESENCE — quem está online
// ══════════════════════════════════════════════════════════
let _presenceUnsub = null;

function fbSetPresence(online) {
  if (!currentUser) return;
  const docId = String(currentUser.id);
  if (online) {
    _db.collection('presence').doc(docId).set({
      uid: currentUser.id, name: currentUser.name, avatar: currentUser.avatar,
      color: currentUser.color, role: currentUser.role, level: currentUser.level,
      online: true, ts: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  } else {
    _db.collection('presence').doc(docId).delete().catch(()=>{});
  }
}

// level=null → admin (mostra todos); level=N → clientes daquele nível
function fbSubscribePresence(level, containerId) {
  if (_presenceUnsub) { try{_presenceUnsub();}catch(e){} _presenceUnsub=null; }
  let query = _db.collection('presence');
  if (level !== null) query = query.where('level','==',level);
  _presenceUnsub = query.onSnapshot(snap => {
    if (!currentUser) return;
    const users = [];
    snap.forEach(d => {
      const data = d.data();
      users.push(data);
    });
    const el = document.getElementById('presence-' + containerId);
    if (!el) return;
    if (!users.length) {
      el.innerHTML = '<span style="font-size:0.73rem;color:var(--muted);">● Nenhum online</span>';
      return;
    }
    const count = users.length;
    const avatarHtml = users.slice(0,5).map(u =>
      `<span title="${u.name}${u.role==='admin'?' (Admin)':''}" style="width:22px;height:22px;border-radius:50%;background:${u.color};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:0.52rem;font-weight:700;border:2px solid var(--dark2);flex-shrink:0;">${u.avatar}</span>`
    ).join('');
    el.innerHTML = `<span class="live-dot" style="width:7px;height:7px;"></span><span style="font-size:0.72rem;color:var(--green);font-weight:600;">${count} online</span>${avatarHtml}`;
  }, () => {});
}

function fbUnsubscribePresenceAndTyping() {
  if (_presenceUnsub) { try{_presenceUnsub();}catch(e){} _presenceUnsub=null; }
  Object.values(_typingUnsubs).forEach(u=>{ try{u();}catch(e){} });
  Object.keys(_typingUnsubs).forEach(k=>delete _typingUnsubs[k]);
  Object.keys(_typingTimeouts).forEach(k=>{ clearTimeout(_typingTimeouts[k]); delete _typingTimeouts[k]; });
}

// Limpar presença ao fechar a aba
window.addEventListener('beforeunload', () => { if(currentUser) fbSetPresence(false); });

// ── Seed: cria admin se Firestore estiver vazio ──
_db.collection('users').limit(1).get().then(snap => {
  if (!snap.empty) return;
  _auth.createUserWithEmailAndPassword('admin@evastek.com','admin123')
    .then(cred => _db.collection('users').doc(cred.user.uid).set({
      id: cred.user.uid, name:'Admin Evastek', email:'admin@evastek.com', pass:'admin123',
      role:'admin', company:'Evastek', level:0, progress:100, points:0,
      avatar:'AE', color:'#1a5fa8', suspended:null
    }))
    .then(() => _auth.signOut())
    .catch(e => console.warn('Seed skip:', e.message));
}).catch(()=>{});

// ── Sempre limpar sessão ao carregar — login sempre manual ──
_auth.signOut().catch(()=>{});
</script>

<style>
:root {
  --dark:#1c1f26; --dark2:#22262f; --dark3:#282d38;
  --light:#f8f9fa; --muted:#8a9ab0; --border:rgba(248,249,250,0.07);
  --accent:#1a5fa8; --accent-light:#4a9edd;
  --l1:#4a9edd; --l1-bg:rgba(74,158,221,0.1);
  --l2:#2ecc8f; --l2-bg:rgba(46,204,143,0.1);
  --l3:#f0a500; --l3-bg:rgba(240,165,0,0.1);
  --l4:#a78bfa; --l4-bg:rgba(167,139,250,0.1);
  --green:#2ecc8f; --red:#ff5c5c; --yellow:#f0a500;
  --sidebar:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--light);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh;}
.screen{display:none;min-height:100vh;} .screen.active{display:flex;}
#screen-login{align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(13,43,78,0.7) 0%,transparent 70%);}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%);}
.login-box{position:relative;z-index:1;width:100%;max-width:420px;padding:0 24px;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-0.02em;text-align:center;margin-bottom:8px;}
.login-logo span{color:var(--accent-light);}
.login-sub{text-align:center;font-size:0.82rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:48px;}
.login-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:36px;}
.login-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:8px;}
.field input,.field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:12px 16px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;}
.field input:focus,.field textarea:focus{border-color:var(--accent-light);}
.field select{width:100%;background:var(--dark3);border:1px solid rgba(74,158,221,0.3);border-radius:4px;padding:12px 16px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;appearance:none;cursor:pointer;transition:border-color .25s;}
.field select:focus{border-color:var(--accent-light);}
.field select option{background:var(--dark3);color:var(--light);}
.btn-login{width:100%;background:var(--light);color:var(--dark);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:14px;border:none;border-radius:4px;cursor:pointer;margin-top:8px;transition:background 0.3s,transform 0.2s;}
.btn-login:hover{background:#c8d6e8;transform:translateY(-1px);}
.login-hint{font-size:0.72rem;color:var(--muted);text-align:center;margin-top:20px;}
.login-err{font-size:0.8rem;color:var(--red);text-align:center;margin-top:12px;display:none;}
#screen-app{flex-direction:row;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo a{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;color:var(--light);text-decoration:none;}
.sidebar-logo a span{color:var(--accent-light);}
.sidebar-logo .platform-tag{font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;flex-shrink:0;}
.user-info .user-name{font-size:0.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.user-info .user-role{font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.sidebar-nav{flex:1;padding:16px 0;}
.nav-section-title{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:8px 20px 4px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);font-size:0.85rem;cursor:pointer;transition:color 0.2s,background 0.2s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--light);background:rgba(255,255,255,0.03);}
.nav-item.active{color:var(--light);background:rgba(74,158,221,0.07);border-left-color:var(--accent-light);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.nav-badge{background:var(--accent);color:#fff;font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.btn-logout{width:100%;background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:10px;cursor:pointer;transition:color 0.3s,border-color 0.3s;}
.btn-logout:hover{color:var(--red);border-color:var(--red);}
.main-content{flex:1;overflow-y:auto;height:100vh;}
.page{display:none;padding:32px 36px;animation:fadeIn 0.3s ease;} .page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.page-header{margin-bottom:32px;}
.page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-0.02em;margin-bottom:4px;}
.page-subtitle{font-size:0.88rem;color:var(--muted);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:20px 24px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.c1::before{background:var(--l1);}.stat-card.c2::before{background:var(--l2);}

<script>
// ══════════════════════════════════
//  MOBILE SIDEBAR
// ══════════════════════════════════
function toggleMobileSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('hamburger-btn');
  const isOpen   = sidebar.classList.contains('mobile-open');
  if (isOpen) {
    closeMobileSidebar();
  } else {
    sidebar.classList.add('mobile-open');
    overlay.classList.add('active');
    hamburger.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}

function closeMobileSidebar() {
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('hamburger-btn');
  sidebar.classList.remove('mobile-open');
  overlay.classList.remove('active');
  if (hamburger) hamburger.classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe-to-open: drag from left edge → open sidebar
(function() {
  let touchStartX = 0, touchStartY = 0, swiping = false;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swiping = touchStartX < 24; // only trigger from left edge
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if (dx > 40 && dy < 60) {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar.classList.contains('mobile-open')) toggleMobileSidebar();
      swiping = false;
    }
  }, { passive: true });
  // Swipe left on sidebar → close
  let swipeCloseStartX = 0;
  document.getElementById('sidebar') && document.addEventListener('touchstart', e2 => {
    swipeCloseStartX = e2.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeCloseStartX;
    const sidebar = document.getElementById('sidebar');
    if (sidebar && sidebar.classList.contains('mobile-open') && dx < -60) {
      closeMobileSidebar();
    }
  }, { passive: true });
})();

// Close sidebar on ESC key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMobileSidebar(); });

// ══════════════════════════════════
//  DATA STORE — limpo, sem demo
// ══════════════════════════════════
const DB = {
  users: [],
  auditLog: [],
  messages: { 1:[], 2:[], 3:[], 4:[] },
  investments: {} // uid → { entries:[], roi:{} }
};

let currentUser  = null;
let currentPage  = null;
let currentAdminChatLevel = 1;

// ══════════════════════════════════
//  HELPERS
// ══════════════════════════════════
const iS = s => `width:100%;background:var(--dark3);border:1px solid rgba(74,158,221,0.3);border-radius:4px;padding:10px 14px;color:var(--light);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;margin-top:6px;${s||''}`;
function levelName(l)  { return ['','Semente','Raiz','Tronco','Copa'][l]||'—'; }
function levelColor(l) { return ['','#4a9edd','#2ecc8f','#f0a500','#a78bfa'][l]||'#4a9edd'; }
function levelClass(l) { return ['','l1','l2','l3','l4'][l]||'l1'; }
function levelBadge(l) { return `<span class="level-badge badge-${levelClass(l)}">${levelName(l)}</span>`; }
function getInitials(n){ return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }

function showNotif(msg, type='success') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif show ${type}`;
  setTimeout(() => el.classList.remove('show'), 3500);
}
function openModal(title, body, footer, wide=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  const box = document.getElementById('modal-box');
  box.className = wide ? 'modal modal-wide' : 'modal';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target.id==='modal-overlay') closeModal(); });

function addAuditEntry(type, icon, action) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const time = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const entry = { id: Date.now(), type, icon, adminName: currentUser?.name||'Sistema', action, time, ts: Date.now() };
  DB.auditLog.unshift(entry);
  fbAddAudit(entry).catch(()=>{});
  const el = document.getElementById('audit-log-body');
  if (el) renderAuditList();
}

// Recalculate progress and points from tasks
function recalcUser(user) {
  if (!user.tasks || !user.tasks.length) { user.progress = 0; return; }
  const done = user.tasks.filter(t=>t.done).length;
  user.progress = Math.round(done / user.tasks.length * 100);
  user.points = user.tasks.filter(t=>t.done).reduce((s,t)=>s+t.points,0);
}

// ══════════════════════════════════
//  AUTH
// ══════════════════════════════════
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { showLoginErr('Preencha e-mail e senha.'); return; }

  // Verify Firebase is loaded
  if (typeof firebase === 'undefined' || !_auth) {
    showLoginErr('Sistema ainda carregando. Aguarde 2 segundos e tente novamente.');
    return;
  }

  const btn = document.querySelector('.btn-login');
  if (btn) { btn.disabled = true; btn.textContent = 'Entrando...'; }

  showFBLoading('Autenticando...');

  _auth.signInWithEmailAndPassword(email, pass)
    .then(async () => {
      showFBLoading('Carregando dados...');
      try {
        await fbSyncUsers();
      } catch(e) {
        hideFBLoading();
        if (btn) { btn.disabled = false; btn.textContent = 'Acessar plataforma'; }
        showLoginErr('Erro ao carregar dados: ' + e.message);
        return;
      }
      await fbSyncAudit().catch(()=>{});
      await fbSyncMessages().catch(()=>{});
      await fbSyncInvestments().catch(()=>{});

      const user = DB.users.find(u => u.email === email);
      if (!user) {
        hideFBLoading();
        if (btn) { btn.disabled = false; btn.textContent = 'Acessar plataforma'; }
        showLoginErr('Usuário não encontrado. Contate o administrador.');
        return;
      }
      if (user.role !== 'admin' && isSuspendedNow(user)) {
        const s = user.suspended;
        let msg = 'Sua conta está suspensa.';
        if (s && s.reason) msg += ' Motivo: ' + s.reason;
        if (s && s.type === 'timed' && s.until) {
          const d = new Date(s.until);
          msg += ' Até: ' + d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        } else if (s && s.type === 'until_unlock') msg += ' Aguarde liberação do administrador.';
        hideFBLoading();
        if (btn) { btn.disabled = false; btn.textContent = 'Acessar plataforma'; }
        showLoginErr(msg);
        return;
      }
      currentUser = user;
      hideFBLoading();
      if (btn) { btn.disabled = false; btn.textContent = 'Acessar plataforma'; }
      document.getElementById('login-err').style.display = 'none';
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-app').classList.add('active');
      fbSetPresence(true);
      buildShell();
      if (user.role === 'client') {
        fbSubscribeChat(user.level, 'chat-messages-client');
      } else {
        [1,2,3,4].forEach(l => fbSubscribeChat(l, 'chat-messages-admin'));
      }
    })
    .catch(err => {
      hideFBLoading();
      if (btn) { btn.disabled = false; btn.textContent = 'Acessar plataforma'; }
      const code = err.code || '';
      if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
        showLoginErr('E-mail ou senha incorretos.');
      } else if (code === 'auth/too-many-requests') {
        showLoginErr('Muitas tentativas. Aguarde alguns minutos.');
      } else if (code === 'auth/network-request-failed') {
        showLoginErr('Sem conexão com a internet. Verifique sua rede.');
      } else if (code === 'auth/invalid-api-key') {
        showLoginErr('Erro de configuração do sistema. Contate o suporte.');
      } else {
        showLoginErr('Erro: ' + (err.message || code));
      }
      console.error('Login error:', err.code, err.message);
    });
}
function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg; el.style.display='block';
}
function doLogout() {
  fbSetPresence(false);
  fbSetTyping(currentUser?.role==='admin'?currentAdminChatLevel:currentUser?.level, false);
  fbUnsubscribeAllChats();
  fbUnsubscribePresenceAndTyping();
  _chatUnsub = null;
  _auth.signOut().catch(()=>{});
  window._adminUser = null; currentUser = null;
  closeMobileSidebar();
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  const banner=document.getElementById('impersonate-banner'); if(banner) banner.remove();
  document.getElementById('screen-app').style.paddingTop='';
  document.getElementById('screen-app').classList.remove('with-banner');
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ══════════════════════════════════
//  SHELL
// ══════════════════════════════════
function buildShell() {
  const isAdmin = currentUser.role==='admin';
  const av = document.getElementById('sb-avatar');
  av.textContent = currentUser.avatar;
  av.style.background = currentUser.color;
  av.style.color = '#fff';
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = isAdmin ? 'Administrador' : `Nível ${currentUser.level} — ${levelName(currentUser.level)}`;

  const nav = document.getElementById('sidebar-nav');
  if (isAdmin) {
    nav.innerHTML = `
      <div class="nav-section-title">Administração</div>
      ${ni('admin-overview','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>','Visão Geral')}
      ${ni('admin-users','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3.3 2.2-5 5-5s5 1.7 5 5"/><circle cx="13" cy="6" r="2"/><path d="M13 10c1.7 0 3 1 3 3"/></svg>','Clientes')}
      ${ni('admin-new','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>','Nova Conta')}
      <div class="nav-section-title" style="margin-top:8px;">Monitoramento</div>
      ${ni('admin-ranking','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10V14M8 6V14M13 2V14"/></svg>','Rankings')}
      ${ni('admin-investment','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l4-4 3 3 5-6"/><circle cx="14" cy="6" r="1.5" fill="currentColor"/></svg>','Investimentos')}
      ${ni('admin-chat','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2z"/></svg>','Chat dos Níveis')}
      ${ni('admin-audit','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M5 6h6M5 9h4"/></svg>','Log de Atividades')}`;
    document.getElementById('main-content').innerHTML = buildAdminOverview()+buildAdminUsers()+buildAdminNew()+buildAdminRanking()+buildAdminInvestment()+buildAdminChat()+buildAdminAudit();
    navigateTo('admin-overview');
  } else {
    nav.innerHTML = `
      <div class="nav-section-title">Minha Conta</div>
      ${ni('client-dashboard','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>','Dashboard')}
      ${ni('client-progress','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 3"/></svg>','Meu Progresso')}
      ${ni('client-services','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>','Meus Serviços')}
      ${ni('client-investment','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l4-4 3 3 5-6"/><circle cx="14" cy="6" r="1.5" fill="currentColor"/></svg>','Investimentos & ROI')}
      <div class="nav-section-title" style="margin-top:8px;">Comunidade</div>
      ${ni('client-ranking','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 10V14M8 6V14M13 2V14"/></svg>','Ranking do Nível')}
      ${ni('client-chat','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v9H9l-3 3v-3H2z"/></svg>','Chat do Nível',true)}
      <div class="nav-section-title" style="margin-top:8px;">Ajuda</div>
      ${ni('client-guide','<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1a5 5 0 100 10A5 5 0 008 1zm0 7.5v-1m0-1.5c0-1 .75-1.5 1.5-2a2 2 0 10-3 1.7"/></svg>','Guia da Plataforma')}`;
    document.getElementById('main-content').innerHTML = buildClientDashboard()+buildClientProgress()+buildClientServices()+buildClientInvestment()+buildClientRanking()+buildClientChat()+buildClientGuide();
    navigateTo('client-dashboard');
    if (window._adminUser) {
      const banner = document.createElement('div');
      banner.id='impersonate-banner';
      banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9998;background:rgba(240,165,0,0.95);color:#1c1f26;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;font-size:0.82rem;font-weight:600;';
      banner.innerHTML=`<span>👁 Modo visualização: <b>${currentUser.name}</b> — ${currentUser.company}</span><button onclick="exitImpersonation()" style="background:rgba(0,0,0,0.15);border:1px solid rgba(0,0,0,0.2);border-radius:4px;padding:5px 14px;font-weight:700;cursor:pointer;font-size:0.78rem;">← Voltar ao Admin</button>`;
      document.body.appendChild(banner);
      document.getElementById('screen-app').style.paddingTop='40px';
      document.getElementById('screen-app').classList.add('with-banner');
    } else {
      const old=document.getElementById('impersonate-banner'); if(old){old.remove();document.getElementById('screen-app').style.paddingTop='';}
    }
  }
}
function ni(id,icon,label,badge=false) {
  return `<div class="nav-item" id="nav-${id}" onclick="navigateTo('${id}')">${icon}<span>${label}</span>${badge?'<span class="nav-badge">AO VIVO</span>':''}</div>`;
}
function navigateTo(id) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const navEl=document.getElementById('nav-'+id), pageEl=document.getElementById('page-'+id);
  if(navEl) navEl.classList.add('active');
  if(pageEl) pageEl.classList.add('active');
  currentPage=id;
  if(id==='admin-audit') setTimeout(renderAuditList,30);
  if(id==='admin-overview') setTimeout(refreshAdminOverview,30);
  if(id==='admin-ranking') setTimeout(refreshAdminRanking,30);
  if(id==='client-chat'&&currentUser) {
    _unreadCount = 0; updateUnreadBadge();
    setTimeout(()=>{
      fbSubscribeChat(currentUser.level,'chat-messages-client');
      fbSubscribeTyping(currentUser.level,'chat-messages-client');
      fbSubscribePresence(currentUser.level,'chat-messages-client');
    },50);
  }
  if(id==='admin-chat') {
    _unreadCount = 0; updateUnreadBadge();
    setTimeout(()=>{
      fbSubscribeChat(currentAdminChatLevel,'chat-messages-admin');
      fbSubscribeTyping(currentAdminChatLevel,'chat-messages-admin');
      fbSubscribePresence(null,'chat-messages-admin');
    },50);
  }
  // Auto-close sidebar on mobile after navigation
  if(window.innerWidth<=768) closeMobileSidebar();
}
function exitImpersonation() {
  currentUser=window._adminUser; window._adminUser=null;
  const b=document.getElementById('impersonate-banner'); if(b) b.remove();
  document.getElementById('screen-app').style.paddingTop='';
  document.getElementById('screen-app').classList.remove('with-banner');
  buildShell(); showNotif('Voltou ao painel do administrador.','success');
}

// ══════════════════════════════════
//  SUSPENSION
// ══════════════════════════════════
function isSuspendedNow(u) {
  if (!u.suspended) return false;
  if (u.suspended.type==='until_unlock') return true;
  if (u.suspended.type==='timed'&&u.suspended.until) return new Date(u.suspended.until)>new Date();
  return false;
}

// ══════════════════════════════════
//  CLIENT PAGES
// ══════════════════════════════════
function levelDesc(l) { return ['','Construindo identidade e base da marca','Crescendo presença digital e audiência','Estruturando para escalar resultados','Dominando o mercado com todos os recursos'][l]||''; }

function buildClientDashboard() {
  const u=currentUser, lc=levelClass(u.level), color=levelColor(u.level);
  const tasksDone=u.tasks?u.tasks.filter(t=>t.done).length:0, tasksTotal=u.tasks?u.tasks.length:0;
  const sameLevel=DB.users.filter(x=>x.role==='client'&&x.level===u.level).sort((a,b)=>b.points-a.points);
  const myRank=sameLevel.findIndex(x=>x.id===u.id)+1;
  return `<div class="page" id="page-client-dashboard">
    <div class="page-header">
      <div class="page-title">Olá, ${u.name.split(' ')[0]}! 👋</div>
      <div class="page-subtitle">Bem-vindo à sua plataforma de crescimento — ${u.company}</div>
    </div>
    <div class="level-hero lh-${lc}">
      <div class="level-hero-bg-num">0${u.level}</div>
      <div class="lh-row">
        <div class="lh-orb">0${u.level}</div>
        <div>
          <div style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:${color};font-weight:600;margin-bottom:4px;">Nível Atual</div>
          <div class="lh-title">${levelName(u.level)} — ${u.company}</div>
          <div class="lh-sub">${levelDesc(u.level)}</div>
        </div>

const ROI_SERVICES_CLIENT = ['Tráfego Pago','Marketing Digital','Gestão de Tráfego'];

function buildClientInvestment() {
  const u = currentUser;
  const data = DB.investments[u.id] || { entries: [] };
  const entries = data.entries || [];

  const fmt = v => 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

  const totalInvested = entries.reduce((s,e) => s + (e.value||0), 0);

  // ROI-eligible entries only
  const roiEntries = entries.filter(e => ROI_SERVICES_CLIENT.includes(e.service) && e.roi && (e.roi.totalReturn||0) > 0);
  const totalRoiInvested = roiEntries.reduce((s,e) => s + (e.value||0), 0);
  const totalRoiReturn   = roiEntries.reduce((s,e) => s + (e.roi?.totalReturn||0), 0);
  const totalRoiPct      = totalRoiInvested > 0 ? (((totalRoiReturn - totalRoiInvested) / totalRoiInvested) * 100).toFixed(1) : null;
  const totalRoiPositive = totalRoiPct !== null && parseFloat(totalRoiPct) >= 0;

  const serviceColors = {
    'Branding & Identidade Visual':'#4a9edd','Social Media':'#2ecc8f',
    'Marketing Digital':'#f0a500','Gestão de Tráfego':'#a78bfa','Tráfego Pago':'#a78bfa',
    'Criação de Conteúdo':'#ff6b6b','Consultoria Estratégica':'#06d6a0',
  };

  // Group by service for distribution chart
  const byService = {};
  entries.forEach(e => {
    if (!byService[e.service]) byService[e.service] = 0;
    byService[e.service] += e.value || 0;
  });
  const totalForChart = Object.values(byService).reduce((a,b)=>a+b,0)||1;

  return `<div class="page" id="page-client-investment">
    <div class="page-header">
      <div class="page-title">Investimentos & ROI</div>
      <div class="page-subtitle">Clique em qualquer aporte para ver os resultados detalhados</div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-card c1">
        <div class="stat-card-label">Total Investido</div>
        <div class="stat-card-value" style="font-size:1.4rem;">${fmt(totalInvested)}</div>
        <div class="stat-card-sub">${entries.length} aporte${entries.length!==1?'s':''}</div>
      </div>
      <div class="stat-card c2">
        <div class="stat-card-label">Retorno (ROI)</div>
        <div class="stat-card-value" style="font-size:1.4rem;color:var(--green)">${totalRoiReturn > 0 ? fmt(totalRoiReturn) : '—'}</div>
        <div class="stat-card-sub">${roiEntries.length} campanhas com retorno</div>
      </div>
      <div class="stat-card ${totalRoiPct===null?'c1':totalRoiPositive?'c2':'c4'}">
        <div class="stat-card-label">ROI Total</div>
        <div class="stat-card-value" style="font-size:1.7rem;color:${totalRoiPct===null?'var(--muted)':totalRoiPositive?'var(--green)':'var(--red)'}">
          ${totalRoiPct===null?'—':(totalRoiPositive?'+':'')+totalRoiPct+'%'}
        </div>
        <div class="stat-card-sub">${totalRoiPct===null?'sem dados de performance':'retorno acumulado'}</div>
      </div>
      <div class="stat-card c3">
        <div class="stat-card-label">Lucro Líquido</div>
        <div class="stat-card-value" style="font-size:1.4rem;color:${totalRoiReturn-totalRoiInvested>=0&&totalRoiReturn>0?'var(--green)':'var(--muted)'}">
          ${totalRoiReturn>0?(totalRoiReturn-totalRoiInvested>=0?'+':'')+fmt(totalRoiReturn-totalRoiInvested):'—'}
        </div>
        <div class="stat-card-sub">retorno menos investido</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:20px;">
      <!-- DISTRIBUTION CHART -->
      <div class="box">
        <div class="box-header"><div class="box-title">📊 Distribuição por Serviço</div></div>
        <div class="box-body">
          ${Object.keys(byService).length === 0
            ? `<div class="empty-state"><div class="empty-icon">📊</div><p>Nenhum investimento registrado ainda.</p></div>`
            : Object.entries(byService).map(([svc, val]) => {
                const pct = Math.round(val / totalForChart * 100);
                const color = serviceColors[svc] || '#4a9edd';
                const hasRoi = ROI_SERVICES_CLIENT.includes(svc);
                return `<div style="margin-bottom:14px;">
                  <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                    <span style="font-size:0.82rem;display:flex;align-items:center;gap:7px;">
                      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
                      ${svc} ${hasRoi?'<span style="font-size:0.6rem;background:rgba(74,158,221,0.15);color:var(--accent-light);padding:1px 5px;border-radius:6px;">ROI</span>':''}
                    </span>
                    <span style="font-size:0.8rem;font-weight:600;color:${color};">${fmt(val)} <span style="color:var(--muted);font-weight:400;">(${pct}%)</span></span>
                  </div>
                  <div class="progress-bar" style="height:7px;">
                    <div class="progress-fill" style="width:${pct}%;background:${color};"></div>
                  </div>
                </div>`;
              }).join('')
          }
          <div style="margin-top:14px;padding:10px 12px;background:rgba(74,158,221,0.05);border:1px solid rgba(74,158,221,0.15);border-radius:4px;font-size:0.76rem;color:var(--muted);">
            <b style="color:var(--accent-light);">ROI</b> = calculado apenas para Tráfego Pago, Marketing Digital e Gestão de Tráfego, onde é possível medir o retorno direto.
          </div>
        </div>
      </div>

      <!-- ROI TOTAL POR SERVIÇO -->
      <div class="box">
        <div class="box-header"><div class="box-title">📈 ROI por Serviço de Performance</div></div>
        <div class="box-body">
          ${roiEntries.length === 0
            ? `<div class="empty-state"><div class="empty-icon">📈</div><p>Nenhum dado de performance ainda.<br><span style="font-size:0.78rem;">Os resultados aparecerão aqui quando a Evastek registrar os retornos das suas campanhas.</span></p></div>`
            : (() => {
                // aggregate by ROI service
                const byROISvc = {};
                roiEntries.forEach(e => {
                  if (!byROISvc[e.service]) byROISvc[e.service] = { invested:0, returned:0 };
                  byROISvc[e.service].invested += e.value||0;
                  byROISvc[e.service].returned += e.roi?.totalReturn||0;
                });
                return Object.entries(byROISvc).map(([svc, agg]) => {
                  const pct = ((( agg.returned - agg.invested) / agg.invested) * 100).toFixed(1);
                  const pos = parseFloat(pct) >= 0;
                  const color = serviceColors[svc]||'#a78bfa';
                  return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
                    <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></span>
                    <div style="flex:1;">
                      <div style="font-size:0.85rem;font-weight:500;">${svc}</div>
                      <div style="font-size:0.72rem;color:var(--muted);">Investido: ${fmt(agg.invested)} · Retorno: ${fmt(agg.returned)}</div>
                    </div>
                    <div style="text-align:right;">
                      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:${pos?'var(--green)':'var(--red)'};">${pos?'+':''}${pct}%</div>
                      <div style="font-size:0.7rem;color:var(--muted);">ROI</div>
                    </div>
                  </div>`;
                }).join('');
              })()
          }
        </div>
      </div>
    </div>

    <!-- HISTORY TABLE — clickable entries -->
    <div class="box">
      <div class="box-header">
        <div class="box-title">🧾 Histórico de Aportes</div>
        <span style="font-size:0.78rem;color:var(--accent-light);cursor:default;">👆 Clique em um aporte para ver os detalhes</span>
      </div>
      <div class="box-body" style="padding:0;">
        ${entries.length === 0
          ? `<div class="empty-state"><div class="empty-icon">🧾</div><p>Nenhum aporte registrado ainda. A equipe Evastek irá cadastrar seus investimentos.</p></div>`
          : `<table>
              <thead><tr><th>Data</th><th>Serviço</th><th>Descrição</th><th>Investido</th><th>Retorno</th><th>ROI</th><th>Status</th></tr></thead>
              <tbody>
                ${entries.slice().reverse().map((e, ri) => {
                  const realIdx = entries.length - 1 - ri;
                  const hasROI  = ROI_SERVICES_CLIENT.includes(e.service);
                  const er      = e.roi || {};
                  const eRet    = er.totalReturn || 0;
                  const eRoiPct = hasROI && (e.value||0) > 0 && eRet > 0 ? (((eRet - e.value) / e.value) * 100).toFixed(1) : null;
                  const sc      = serviceColors[e.service]||'#4a9edd';
                  const clickable = hasROI;
                  return `<tr style="cursor:${clickable?'pointer':'default'};" ${clickable?`onclick="openClientEntryROI(${realIdx})" title="Clique para ver detalhes desta campanha"`:''}
                    onmouseover="${clickable?"this.style.background='rgba(74,158,221,0.04)'":''}"
                    onmouseout="this.style.background=''">
                    <td style="color:var(--muted);font-size:0.78rem;">${e.date||'—'}</td>
                    <td>
                      <span style="font-size:0.72rem;padding:3px 10px;border-radius:10px;background:${sc}18;color:${sc};">${e.service||'—'}</span>
                      ${hasROI?'<span style="font-size:0.58rem;margin-left:4px;background:rgba(74,158,221,0.1);color:var(--accent-light);padding:1px 5px;border-radius:4px;">ROI</span>':''}
                    </td>
                    <td style="font-size:0.82rem;color:var(--muted);">${e.description||'—'}</td>
                    <td style="font-family:'Syne',sans-serif;font-weight:700;">${fmt(e.value||0)}</td>
                    <td style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green);">${eRet>0?fmt(eRet):'<span style="color:var(--muted);font-weight:300;font-size:0.8rem;">—</span>'}</td>
                    <td style="font-family:'Syne',sans-serif;font-weight:700;">
                      ${eRoiPct!==null
                        ? `<span style="color:${parseFloat(eRoiPct)>=0?'var(--green)':'var(--red)'};">${parseFloat(eRoiPct)>=0?'+':''}${eRoiPct}%</span>`

// ── CONFETTI ──
let _confettiAnim = null;
let _confettiParticles = [];

function startConfetti(accentColor) {
  const canvas = document.getElementById('confetti-canvas');
  canvas.classList.add('active');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = [accentColor, '#fff', '#fbbf24', '#f8f9fa', accentColor + 'cc', '#a78bfa', '#2ecc8f'];
  _confettiParticles = Array.from({length: 140}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 7 + 3,
    d: Math.random() * 140 + 10,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltAngleInc: Math.random() * 0.07 + 0.05,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    rotation: Math.random() * Math.PI * 2,
    rotationSpeed: (Math.random() - 0.5) * 0.15,
    vx: (Math.random() - 0.5) * 2,
    vy: Math.random() * 3 + 2,
    opacity: 1,
    fade: Math.random() * 0.004 + 0.001,
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    _confettiParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.tiltAngle += p.tiltAngleInc;
      p.x += p.vx + Math.sin(frame * 0.01 + p.d) * 0.5;
      p.y += p.vy;
      p.rotation += p.rotationSpeed;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (frame > 180) p.opacity -= p.fade;
      if (p.y > canvas.height + 20 || p.opacity <= 0) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
        p.opacity = frame > 180 ? 0 : 1;
      }
    });
    frame++;
    if (frame < 360 || _confettiParticles.some(p => p.opacity > 0)) {
      _confettiAnim = requestAnimationFrame(draw);
    } else {
      stopConfetti();
    }
  }
  if (_confettiAnim) cancelAnimationFrame(_confettiAnim);
  draw();
}

function stopConfetti() {
  if (_confettiAnim) { cancelAnimationFrame(_confettiAnim); _confettiAnim = null; }
  const canvas = document.getElementById('confetti-canvas');
  if (canvas) { canvas.classList.remove('active'); canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }
}

function toggleTask(uid, tid) {
  const user=DB.users.find(u=>u.id===uid); if(!user) return;
  const task=user.tasks.find(t=>t.id===tid); if(!task) return;
  task.done=!task.done;
  const oldLevel = user.level;
  recalcUser(user);
  showNotif(task.done?'+'+task.points+' pts! Tarefa concluída!':'Tarefa desmarcada', task.done?'success':'error');

  // Check for auto level up (100% + not max level)
  const shouldLevelUp = task.done && user.progress >= 100 && user.level < 4;

  if (shouldLevelUp) {
    user.level = oldLevel + 1;
    user.tasks = [];  // Admin will assign new tasks for the new level
    user.progress = 0;
    user.points = 0;
  }

  fbPatchUser(uid,{tasks:user.tasks,points:user.points,progress:user.progress,level:user.level}).catch(()=>{});

  if (currentUser.id===uid) {
    currentUser.tasks=user.tasks; currentUser.points=user.points;
    currentUser.progress=user.progress; currentUser.level=user.level;
  }

  if (shouldLevelUp) {
    // Rebuild the shell navigation (sidebar now shows new level)
    const sbRole = document.getElementById('sb-role');
    if (sbRole) sbRole.textContent = 'Nível ' + user.level + ' — ' + levelName(user.level);
    // Show celebration FIRST, then rebuild on close
    showLevelUpCelebration(oldLevel, user.level);
  } else {
    const cur=currentPage;
    document.getElementById('main-content').innerHTML=buildClientDashboard()+buildClientProgress()+buildClientServices()+buildClientInvestment()+buildClientRanking()+buildClientChat()+buildClientGuide();
    navigateTo(cur);
    // Update container ref after rebuild
    _chatContainers[user.level] = 'chat-messages-client';
    renderChatMessages(user.level);
  }
}

function handleTypingInput(type) {
  if (!currentUser) return;
  const level = type === 'admin' ? currentAdminChatLevel : currentUser.level;
  fbSetTyping(level, true);
  clearTimeout(_typingTimeouts[level]);
  _typingTimeouts[level] = setTimeout(() => fbSetTyping(level, false), 3000);
}

function sendMsg(type) {
  const u = currentUser;
  const input = document.getElementById('chat-input-' + type);
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const time = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
  const level = type === 'admin' ? currentAdminChatLevel : u.level;
  const msg = { uid:u.id, name:u.name, avatar:u.avatar, color:u.color, role:u.role, text, time, level };

  // Clear input immediately for snappy UX
  input.value = '';
  input.focus();
  fbSetTyping(level, false);
  clearTimeout(_typingTimeouts[level]);

  // Write to Firestore — onSnapshot will update ALL connected clients automatically
  fbAddMessage(msg).catch(err => {
    showNotif('Erro ao enviar mensagem. Tente novamente.', 'error');
    input.value = text; // restore on failure
  });

  // Points for networking (client only)
  if (type === 'client') {
    u.points += 20;
    fbPatchUser(u.id, {points: u.points}).catch(()=>{});
    if (currentUser.id === u.id) currentUser.points = u.points;
    showNotif('+20 pts por participar do networking!', 'success');
  }
}

function loadAdminClientInvestment(uid) {
  // Highlight selected
  document.querySelectorAll('[id^=inv-btn-]').forEach(b => b.classList.remove('btn-accent'));
  const selBtn = document.getElementById('inv-btn-'+uid);
  if(selBtn) { selBtn.classList.remove('btn-ghost'); selBtn.classList.add('btn-accent'); }

  const user = DB.users.find(u => u.id === uid);
  if (!user) return;
  if (!DB.investments[uid]) DB.investments[uid] = { entries:[], roi:{} };
  const data = DB.investments[uid];
  const entries = data.entries || [];
  const fmt = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

  // Serviços que permitem cálculo de ROI (tráfego pago / performance)
  const ROI_SERVICES = ['Tráfego Pago','Marketing Digital','Gestão de Tráfego'];
  const ALL_SERVICES = ['Branding & Identidade Visual','Criação de Conteúdo','Social Media','Consultoria Estratégica','Marketing Digital','Tráfego Pago','Gestão de Tráfego'];

  const totalInvested = entries.reduce((s,e)=>s+(e.value||0),0);
  // Total ROI: só soma entradas que têm ROI calculável
  const roiEntries = entries.filter(e => ROI_SERVICES.includes(e.service) && e.roi && e.roi.totalReturn > 0);
  const totalRoiInvested = roiEntries.reduce((s,e)=>s+(e.value||0),0);
  const totalRoiReturn   = roiEntries.reduce((s,e)=>s+(e.roi?.totalReturn||0),0);
  const totalRoiPct      = totalRoiInvested>0?(((totalRoiReturn-totalRoiInvested)/totalRoiInvested)*100).toFixed(1):null;

  const panel = document.getElementById('admin-investment-panel');
  panel.innerHTML = `
    <!-- CLIENT HEADER -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:16px 20px;background:var(--dark2);border:1px solid var(--border);border-radius:6px;">
      <div style="width:38px;height:38px;border-radius:50%;background:${user.color};color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;">${user.avatar}</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;">${user.name}</div>
        <div style="font-size:0.75rem;color:var(--muted);">${user.company} — ${levelBadge(user.level)}</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:20px;text-align:right;flex-wrap:wrap;">
        <div><div style="font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;">Total investido</div><div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--accent-light);">${fmt(totalInvested)}</div></div>
        <div><div style="font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;">Retorno ROI</div><div style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green);">${fmt(totalRoiReturn)}</div></div>
        <div><div style="font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;">ROI Total</div><div style="font-family:'Syne',sans-serif;font-weight:700;color:${totalRoiPct===null?'var(--muted)':parseFloat(totalRoiPct)>=0?'var(--green)':'var(--red)'};">${totalRoiPct===null?'—':((parseFloat(totalRoiPct)>=0?'+':'')+totalRoiPct+'%')}</div></div>
      </div>
    </div>

    <!-- REGISTRAR APORTE -->
    <div class="box" style="margin-bottom:20px;">
      <div class="box-header"><div class="box-title">➕ Registrar Aporte</div></div>
      <div class="box-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="field"><label>Serviço</label>
            <select id="inv-service" onchange="toggleAdminROIFields()" style="${iS()}">
              ${ALL_SERVICES.map(s=>`<option value="${s}">${s}${ROI_SERVICES.includes(s)?' 📊':''}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Valor Investido (R$)</label>
            <input type="number" id="inv-value" placeholder="0,00" min="0" step="0.01" style="${iS()}"/>
          </div>
          <div class="field"><label>Descrição</label>
            <input type="text" id="inv-desc" placeholder="Ex: Campanha de tráfego Maio/2025" style="${iS()}"/>
          </div>
          <div class="field"><label>Data</label>
            <input type="date" id="inv-date" value="${new Date().toISOString().split('T')[0]}" style="${iS()}"/>
          </div>
          <div class="field"><label>Status</label>

                    <td style="font-family:'Syne',sans-serif;font-weight:700;color:var(--green);">${hasROI&&eRet>0?fmt(eRet):'<span style="color:var(--muted);font-size:0.75rem;">—</span>'}</td>
                    <td style="font-family:'Syne',sans-serif;font-weight:700;">${eRoiPct!==null?`<span style="color:${parseFloat(eRoiPct)>=0?'var(--green)':'var(--red)'};">${parseFloat(eRoiPct)>=0?'+':''}${eRoiPct}%</span>`:'<span style="color:var(--muted);font-size:0.72rem;">${hasROI?"sem dados":"N/A"}</span>'}</td>
                    <td><span style="font-size:0.68rem;padding:2px 8px;border-radius:10px;background:${e.status==='concluído'?'rgba(46,204,143,0.12)':e.status==='em andamento'?'rgba(240,165,0,0.12)':'rgba(255,255,255,0.06)'};color:${e.status==='concluído'?'var(--green)':e.status==='em andamento'?'var(--yellow)':'var(--muted)'};">${e.status||'—'}</span></td>

                    </td>

                }).join('')}
              </tbody>
            </table>`

    </div>
  `;
}

function saveEntryROI(uid, idx) {
  if (!DB.investments[uid]?.entries) return;
  const entry = DB.investments[uid].entries[idx];
  if (!entry) return;
  entry.roi = {
    totalReturn:  parseFloat(document.getElementById('er-return')?.value||'0'),
    leads:        document.getElementById('er-leads')?.value.trim(),
    reach:        document.getElementById('er-reach')?.value.trim(),
    conversions:  document.getElementById('er-conversions')?.value.trim(),
    newClients:   document.getElementById('er-newclients')?.value.trim(),
    cac:          parseFloat(document.getElementById('er-cac')?.value||'0'),
    notes:        document.getElementById('er-notes')?.value.trim(),
  };
  if (typeof _db !== 'undefined') {
    try { _db.collection('investments').doc(uid).set(DB.investments[uid]); } catch(e){}
  }
  const u = DB.users.find(x=>x.id===uid);
  const fmt = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  addAuditEntry('roi','📊',`ROI de ${fmt(entry.roi.totalReturn)} registrado em "${entry.description||entry.service}" para ${u?.name||uid}`);
  closeModal();
  showNotif('ROI salvo com sucesso! 📊','success');
  loadAdminClientInvestment(uid);
}

function adminAddInvestment(uid) {
  const ROI_SERVICES = ['Tráfego Pago','Marketing Digital','Gestão de Tráfego'];
  const service     = document.getElementById('inv-service')?.value;
  const value       = parseFloat(document.getElementById('inv-value')?.value||'0');
  const description = document.getElementById('inv-desc')?.value.trim();
  const date        = document.getElementById('inv-date')?.value;
  const status      = document.getElementById('inv-status')?.value;

  if (!value || value <= 0) { showNotif('Digite um valor válido!','error'); return; }
  if (!DB.investments[uid]) DB.investments[uid] = { entries:[] };

  let roi = null;
  if (ROI_SERVICES.includes(service)) {
    const ret = parseFloat(document.getElementById('inv-roi-return')?.value||'0');
    const leads = document.getElementById('inv-roi-leads')?.value.trim();
    if (ret > 0 || leads) {
      roi = {
        totalReturn:  ret,
        leads:        leads,
        reach:        document.getElementById('inv-roi-reach')?.value.trim(),
        conversions:  document.getElementById('inv-roi-conversions')?.value.trim(),
        newClients:   document.getElementById('inv-roi-newclients')?.value.trim(),
        cac:          parseFloat(document.getElementById('inv-roi-cac')?.value||'0'),
        notes:        document.getElementById('inv-roi-notes')?.value.trim(),
      };
    }
  }

  DB.investments[uid].entries.push({ service, value, description, date, status, roi, id: Date.now() });

  // Sync to Firebase
  if (typeof _db !== 'undefined') {
    try { _db.collection('investments').doc(uid).set(DB.investments[uid]); } catch(e){}
  }

  showNotif('Aporte registrado com sucesso!','success');
  addAuditEntry('investment','💰',`Aporte de R$ ${value.toLocaleString('pt-BR',{minimumFractionDigits:2})} em ${service} para ${DB.users.find(u=>u.id===uid)?.name||uid}`);
  loadAdminClientInvestment(uid);
}

function adminSaveROI(uid) {
  // mantido por compatibilidade — ROI agora é por entrada
  showNotif('Use o botão 📊 ROI em cada aporte para editar o ROI individual.','warn');
  if (typeof _db !== 'undefined') {
    try { _db.collection('investments').doc(uid).set(DB.investments[uid]); } catch(e){}
  }

  showNotif('Resultados de ROI salvos!','success');
  addAuditEntry('roi','📈',`ROI atualizado para ${DB.users.find(u=>u.id===uid)?.name||uid}`);
  loadAdminClientInvestment(uid);
}

function adminDeleteInvestment(uid, idx) {
  if (!DB.investments[uid]?.entries) return;
  DB.investments[uid].entries.splice(idx,1);
  if (typeof _db !== 'undefined') {
    try { _db.collection('investments').doc(uid).set(DB.investments[uid]); } catch(e){}
  }
  showNotif('Aporte removido.','info');
  loadAdminClientInvestment(uid);
}

let auditFilter='all';
function setAuditFilter(f) {
  auditFilter=f;
  document.querySelectorAll('.audit-filter-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('af-'+f); if(el) el.classList.add('active');
  renderAuditList();
}
function renderAuditList() {
  const search=((document.getElementById('audit-search')||{}).value||'').toLowerCase();
  const entries=DB.auditLog.filter(e=>{
    if(auditFilter!=='all'&&e.type!==auditFilter) return false;
    if(search&&!e.action.toLowerCase().includes(search)&&!e.adminName.toLowerCase().includes(search)) return false;
    return true;
  });
  const countEl=document.getElementById('audit-count'); if(countEl) countEl.textContent=entries.length+' registro'+(entries.length!==1?'s':'');
  const body=document.getElementById('audit-log-body'); if(!body) return;
  if(!entries.length){body.innerHTML='<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:32px 0;">Nenhum registro encontrado.</div>';return;}
  const typeColors={create:'var(--green)',edit:'var(--accent-light)',delete:'var(--red)',level:'var(--yellow)',suspend:'#a78bfa',unsuspend:'var(--green)',task:'var(--accent-light)'};
  body.innerHTML=entries.map(e=>`
    <div class="audit-item">
      <div class="audit-icon type-${e.type}">${e.icon}</div>
      <div class="audit-content">
        <div class="audit-action">${e.action}</div>
        <div class="audit-meta">Por <span class="audit-admin">${e.adminName}</span> · ${e.time}</div>
      </div>
      <span style="font-size:0.65rem;padding:3px 8px;border-radius:10px;background:rgba(0,0,0,0.2);color:${typeColors[e.type]||'var(--muted)'};border:1px solid ${typeColors[e.type]||'var(--muted)'}44;">${e.type}</span>
    </div>`).join('');
}
function clearAuditLog() {
  openModal('Limpar log','<p style="color:var(--muted);font-size:0.9rem;line-height:1.6;">Tem certeza que deseja apagar todo o histórico?</p>',
    '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="DB.auditLog=[];renderAuditList();closeModal();showNotif(\'Log limpo.\',\'error\');">Confirmar limpeza</button>');
}

function createUser() {
  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const pass=document.getElementById('new-pass').value;
  const isAdmin=newAccountType==='admin';
  if(!name||!email||!pass){showNotif('Preencha nome, e-mail e senha!','error');return;}
  if(DB.users.find(u=>u.email===email)){showNotif('Este e-mail já está cadastrado!','error');return;}
  const colors=['#4a9edd','#2ecc8f','#f0a500','#a78bfa','#ff6b6b','#06d6a0','#e879f9','#38bdf8'];
  const color=colors[DB.users.length%colors.length];
  showFBLoading('Criando conta...');
  _auth.createUserWithEmailAndPassword(email,pass)
    .then(async cred=>{
      const uid=cred.user.uid;
      let newUser;
      if(isAdmin) {
        newUser={id:uid,name,email,pass,role:'admin',company:'Evastek',level:0,progress:100,points:0,avatar:getInitials(name),color:'#1a5fa8',suspended:null};
        addAuditEntry('create','🛡️','Criou conta de administrador para <b>'+name+'</b>');
      } else {
        const company=document.getElementById('new-company').value.trim();
        const level=parseInt(document.getElementById('new-level').value);
        if(!company){hideFBLoading();showNotif('Informe o nome da empresa!','error');return;}
        // New clients start with NO tasks — admin adds them via task editor
        newUser={id:uid,name,email,pass,role:'client',company,level,progress:0,points:0,avatar:getInitials(name),color,tasks:[],suspended:null};
        addAuditEntry('create','✅','Criou conta do cliente <b>'+name+'</b> ('+company+') — Nível '+level);
      }
      await fbSaveUser(newUser);
      await fbSyncUsers();
      // Re-sign in as admin
      const adminEmail=currentUser.email, adminPass=currentUser.pass;
      await _auth.signInWithEmailAndPassword(currentUser.email, currentUser.pass).catch(()=>{});
      hideFBLoading();
      showNotif((isAdmin?'Administrador ':'Cliente ')+name+' criado com sucesso!','success');
      ['new-name','new-email','new-pass','new-company'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
      const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
      const al=document.getElementById('all-accounts-list'); if(al) al.innerHTML=buildAccountsList();
      const sub=document.getElementById('users-subtitle'); if(sub) sub.textContent=DB.users.filter(u=>u.role==='client').length+' contas cadastradas';
    })
    .catch(err=>{hideFBLoading();showNotif('Erro: '+(err.message||err.code),'error');});
}

function saveEditUser(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;

  const levelChanged=newLevel!==u.level;
  u.name=document.getElementById('edit-name').value.trim()||u.name;
  u.company=document.getElementById('edit-company').value.trim()||u.company;
  u.email=document.getElementById('edit-email').value.trim()||u.email;
  const np=document.getElementById('edit-pass').value; if(np) u.pass=np;
  u.level=newLevel;
  u.progress=parseInt(document.getElementById('edit-progress').value)||0;
  u.points=parseInt(document.getElementById('edit-points').value)||0;
  u.avatar=getInitials(u.name);
  if(levelChanged) addAuditEntry('level','🔄','Alterou nível de <b>'+u.name+'</b> ('+u.company+') para Nível '+u.level);
  else addAuditEntry('edit','✏️','Editou dados de <b>'+u.name+'</b> ('+u.company+')');
  fbPatchUser(uid,{name:u.name,company:u.company,email:u.email,pass:u.pass,level:u.level,progress:u.progress,points:u.points,avatar:u.avatar,tasks:u.tasks||[]}).catch(()=>{});
  showNotif('Cliente atualizado!','success');
  closeModal();
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}

// ══════════════════════════════════
//  ADMIN ACTIONS — EDITOR DE TAREFAS
// ══════════════════════════════════
function openTaskEditor(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  renderTaskEditorModal(u);
}

function renderTaskEditorModal(u) {
  const tasks=u.tasks||[];
  const taskRows=tasks.map((t,i)=>`
    <div class="task-edit-row" id="task-row-${t.id}">
      <div class="task-done-toggle ${t.done?'':''}/" style="border-color:${t.done?'var(--green)':'var(--border)'};background:${t.done?'var(--green)':'transparent'};" onclick="toggleTaskDoneAdmin('${u.id}',${t.id},this)" title="${t.done?'Clique para desmarcar':'Clique para marcar como feita'}">
        ${t.done?'<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5"><path d="M2 5l2.5 2.5L8 3"/></svg>':''}
      </div>
      <input type="text" id="task-label-${t.id}" value="${t.label.replace(/"/g,'&quot;')}" placeholder="Descrição da tarefa"/>
      <input type="number" id="task-pts-${t.id}" value="${t.points}" min="1" max="500" title="Pontos"/>
      <span style="font-size:0.65rem;color:var(--muted);white-space:nowrap;">pts</span>
      <button class="btn btn-danger btn-sm" style="flex-shrink:0;" onclick="removeTaskRow('${u.id}',${t.id})">✕</button>
    </div>`).join('');

  const body=`
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:0.82rem;font-weight:500;">${u.company} — ${levelBadge(u.level)}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:4px;">${tasks.filter(t=>t.done).length}/${tasks.length} tarefas concluídas · ${u.points} pts acumulados</div>
      </div>
      <button class="btn btn-accent btn-sm" onclick="addTaskRowTemplate('${u.id}')">+ Adicionar tarefa</button>
    </div>
    <div style="background:rgba(74,158,221,0.06);border:1px solid rgba(74,158,221,0.2);border-radius:4px;padding:8px 12px;margin-bottom:14px;font-size:0.75rem;color:var(--muted);">
      <b style="color:var(--accent-light);">Como usar:</b> edite o texto e os pontos de cada tarefa. Clique no círculo para marcar/desmarcar como concluída. Clique ✕ para remover.
    </div>
    <div style="display:grid;grid-template-columns:24px 1fr 70px 30px 36px;gap:6px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px;">
      <div style="font-size:0.65rem;color:var(--muted);text-align:center;">✓</div>
      <div style="font-size:0.65rem;color:var(--muted);">Descrição</div>
      <div style="font-size:0.65rem;color:var(--muted);text-align:center;">Pts</div>
      <div></div><div></div>
    </div>
    <div id="task-editor-rows" style="max-height:340px;overflow-y:auto;">${taskRows||'<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Nenhuma tarefa. Clique em "+ Adicionar tarefa".</div>'}</div>
    <div style="margin-top:14px;">
      <div style="background:rgba(46,204,143,0.06);border:1px solid rgba(46,204,143,0.2);border-radius:4px;padding:8px 12px;font-size:0.75rem;color:var(--muted);">
        <b style="color:var(--green);">Modelos rápidos:</b>&nbsp;
        ${[1,2,3,4].map(l=>`<button class="btn btn-ghost btn-sm" style="font-size:0.65rem;padding:3px 8px;margin:2px;" onclick="applyTaskTemplate('${u.id}',${l})">Nível ${l}</button>`).join('')}
      </div>
    </div>`;

  openModal(`📋 Tarefas — ${u.name}`, body,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" onclick="saveTaskEditor('${u.id}')">💾 Salvar tarefas</button>`, true);
}

function toggleTaskDoneAdmin(uid, tid, el) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  if(!u.tasks) u.tasks=[];
  const task=u.tasks.find(t=>t.id===tid); if(!task) return;
  task.done=!task.done;
  el.style.borderColor=task.done?'var(--green)':'var(--border)';
  el.style.background=task.done?'var(--green)':'transparent';
  el.innerHTML=task.done?'<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5"><path d="M2 5l2.5 2.5L8 3"/></svg>':'';
}

function removeTaskRow(uid, tid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  u.tasks=(u.tasks||[]).filter(t=>t.id!==tid);
  const row=document.getElementById('task-row-'+tid); if(row) row.remove();
  // Update count
  const container=document.getElementById('task-editor-rows');
  if(container&&!container.querySelector('.task-edit-row')) container.innerHTML='<div style="color:var(--muted);font-size:0.85rem;text-align:center;padding:20px 0;">Nenhuma tarefa. Clique em "+ Adicionar tarefa".</div>';
}

let _taskNextId=Date.now();
function addTaskRowTemplate(uid) {
  _taskNextId++;
  const id=_taskNextId;
  const u=DB.users.find(x=>x.id===uid);
  const container=document.getElementById('task-editor-rows');
  if(!container) return;
  // Remove empty state message if present
  if(container.querySelector('div:not(.task-edit-row)')) container.innerHTML='';
  const row=document.createElement('div');
  row.className='task-edit-row'; row.id='task-row-'+id;
  row.innerHTML=`
    <div class="task-done-toggle" style="border-color:var(--border);background:transparent;" onclick="toggleTaskDoneAdmin('${uid}',${id},this)" title="Marcar como feita"></div>
    <input type="text" id="task-label-${id}" placeholder="Descreva a tarefa..."/>
    <input type="number" id="task-pts-${id}" value="30" min="1" max="500" title="Pontos"/>
    <span style="font-size:0.65rem;color:var(--muted);white-space:nowrap;">pts</span>
    <button class="btn btn-danger btn-sm" style="flex-shrink:0;" onclick="removeTaskRow('${uid}',${id})">✕</button>`;
  container.appendChild(row);
  // Register as pending task in user object so toggle works
  if(u) { if(!u.tasks) u.tasks=[]; u.tasks.push({id,label:'',points:30,done:false}); }
  document.getElementById('task-label-'+id)?.focus();
}

function applyTaskTemplate(uid, level) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const templates=levelTaskTemplates(level);
  u.tasks=templates.map((t,i)=>({...t,done:false}));
  renderTaskEditorModal(u);
}

function saveTaskEditor(uid) {
  const u=DB.users.find(x=>x.id===uid); if(!u) return;
  const rows=document.querySelectorAll('.task-edit-row');
  const newTasks=[];
  rows.forEach((row,i)=>{
    const idMatch=row.id.match(/task-row-(\d+)/); if(!idMatch) return;
    const tid=parseInt(idMatch[1]);
    const labelEl=document.getElementById('task-label-'+tid);
    const ptsEl=document.getElementById('task-pts-'+tid);
    const label=labelEl?labelEl.value.trim():'';
    const pts=ptsEl?parseInt(ptsEl.value)||10:10;
    // Check done state from existing tasks
    const existing=(u.tasks||[]).find(t=>t.id===tid);
    const done=existing?existing.done:false;
    if(label) newTasks.push({id:i+1,label,points:pts,done});
  });
  u.tasks=newTasks;
  recalcUser(u);
  fbPatchUser(uid,{tasks:u.tasks,points:u.points,progress:u.progress}).catch(()=>{});
  addAuditEntry('task','📋','Atualizou tarefas de <b>'+u.name+'</b> ('+u.company+') — '+newTasks.length+' tarefa'+(newTasks.length!==1?'s':''));
  showNotif('Tarefas salvas com sucesso!','success');
  closeModal();
  const tbody=document.getElementById('admin-users-tbody'); if(tbody) tbody.innerHTML=DB.users.filter(u=>u.role==='client').map(buildUserRow).join('');
}
